# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🧪 DATABASE AUDIT                                                          ║
# ║  Validates archive data files and alerts on structural problems.            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🧪 Database Audit"

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "links.txt"
      - "stats.json"
      - "data/**"
      - "scripts/database-audit.sh"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  audit:
    name: "🧪 Validate archive database"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "📦 Install tools"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq bc
          chmod +x scripts/*.sh

      - name: "🧪 Run audit"
        run: bash scripts/database-audit.sh
