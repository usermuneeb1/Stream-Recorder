# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🟣 PIXELDRAIN PLAYBACK HEALTH                                             ║
# ║  Validates Pixeldrain links using the official Pixeldrain API and writes    ║
# ║  data/pixeldrain-health.json. Does not use bypass/proxy services.           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🟣 Pixeldrain Playback Health"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check only; do not commit data/pixeldrain-health.json"
        required: false
        default: "false"
        type: boolean
  schedule:
    # Daily check after cloud refresh.
    - cron: "30 6 * * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: pixeldrain-playback-health
  cancel-in-progress: true

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  TZ: Asia/Karachi

jobs:
  pixeldrain-health:
    name: "🟣 Validate Pixeldrain playback links"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Install tools"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq bc
          sed -i 's/\r$//' scripts/*.sh scripts/*.env 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: "🟣 Build Pixeldrain health map"
        run: bash scripts/update-pixeldrain-playback.sh

      - name: "📋 Summary"
        if: always()
        run: |
          echo "## 🟣 Pixeldrain Playback Health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f data/pixeldrain-health.json ]]; then
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Checked | $(jq -r '.totals.checked // 0' data/pixeldrain-health.json) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Alive | $(jq -r '.totals.alive // 0' data/pixeldrain-health.json) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Dead | $(jq -r '.totals.dead // 0' data/pixeldrain-health.json) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No health file produced." >> "$GITHUB_STEP_SUMMARY"
          fi
