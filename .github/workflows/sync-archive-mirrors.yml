# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔁 SYNC ARCHIVE BACKUPS → GALLERY + MIRRORS                               ║
# ║  Imports missing personal-backup Archive.org items, then repairs mirrors.   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🔁 Sync Archive Backups + Mirrors"

on:
  workflow_dispatch:
    inputs:
      archive_query:
        description: "Archive.org query for your backup videos"
        required: false
        default: "identifier:tml-* AND (title:\"Personal Media Backup\" OR creator:\"Media Archive Bot\" OR subject:backup)"
        type: string
      display_title:
        description: "Public title shown on gallery for imported backups"
        required: false
        default: "Non-Muslims Question Islam Live! Muhammed Ali"
        type: string
      import_max_items:
        description: "Max Archive.org items to inspect/import"
        required: false
        default: "100"
        type: string
      repair_max_items:
        description: "Max recordings to mirror-repair in this run"
        required: false
        default: "20"
        type: string
      destinations:
        description: "Comma list: gofile,pixeldrain,mega"
        required: false
        default: "gofile,pixeldrain,mega"
        type: string
      dry_run:
        description: "Preview only; do not import/upload/update"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: sync-archive-mirrors
  cancel-in-progress: false

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
  MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
  MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  TZ: Asia/Karachi

jobs:
  sync:
    name: "🔁 Import then repair mirrors"
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v7

      - name: "📦 Install tools"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq aria2 megatools bc python3
          sed -i 's/\r$//' scripts/*.sh scripts/*.env 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: "🏛️ Import missing Archive.org backups"
        env:
          ARCHIVE_QUERY: ${{ github.event.inputs.archive_query }}
          DISPLAY_TITLE: ${{ github.event.inputs.display_title }}
          MAX_ITEMS: ${{ github.event.inputs.import_max_items }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: bash scripts/import-archive-backups.sh

      - name: "🛠️ Repair mirrors from Archive.org"
        env:
          MAX_ITEMS: ${{ github.event.inputs.repair_max_items }}
          DESTINATIONS: ${{ github.event.inputs.destinations }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: bash scripts/repair-mirrors.sh

      - name: "📋 Summary"
        if: always()
        run: |
          echo "## 🔁 Archive Backup Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Completed at $(TZ='Asia/Karachi' date '+%Y-%m-%d %H:%M PKT')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If mirror repair uploaded new links, data/recordings.json was updated via GitHub API." >> "$GITHUB_STEP_SUMMARY"
