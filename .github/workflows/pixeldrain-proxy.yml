# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  ⚡ PIXELDRAIN FAST-STREAM PROXY                                             ║
# ║  Normalizes every Pixeldrain link to the canonical /u/{id} form and          ║
# ║  health-checks the GameDrive streaming proxy (cdn.pixeldrain.eu.cc) used by   ║
# ║  the dashboard player. Writes data/pixeldrain-proxy.json so the frontend can  ║
# ║  see which fast-stream host is currently alive.                              ║
# ║                                                                              ║
# ║  IMPORTANT: This does NOT rewrite stored links to a proxy domain. The React  ║
# ║  player converts /u/{id} → fast proxy stream at runtime (with automatic      ║
# ║  failover to pixeldrain.com/api/file/{id}), so the database stays clean and   ║
# ║  portable even if a proxy host changes.                                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "⚡ Pixeldrain Fast-Stream Proxy"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check only; do not commit changes"
        required: false
        default: "false"
        type: boolean
  schedule:
    # Twice weekly: verify the proxy is still alive (GameDrive can be blocked).
    - cron: "15 6 * * 1,4"
  push:
    branches: [main]
    paths:
      - "data/recordings.json"
      - "links.txt"
      - ".github/workflows/pixeldrain-proxy.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

# Prevent overlapping runs from racing on the same commit.
concurrency:
  group: pixeldrain-proxy
  cancel-in-progress: false

jobs:
  proxy-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Configure (proxy hosts)
        id: cfg
        run: |
          # GameDrive streaming CDN (fast). It 302-redirects to a cdnNN node
          # serving video/mp4 with Accept-Ranges + CORS, so it is embeddable.
          echo "PROXY_HOST=cdn.pixeldrain.eu.cc" >> "$GITHUB_ENV"
          # Official direct endpoint (reliable fallback used by the player).
          echo "OFFICIAL_HOST=pixeldrain.com" >> "$GITHUB_ENV"

      - name: 🧹 Normalize Pixeldrain links to canonical /u/{id}
        run: |
          set -euo pipefail
          # Canonicalize any pixeldrain variant (api/file, proxy domains, etc.)
          # back to https://pixeldrain.com/u/{id}. The frontend handles proxying.
          normalize() {
            local f="$1"
            [ -f "$f" ] || return 0
            # api/file/{id}  ->  /u/{id}
            sed -i -E 's#https?://pixeldrain\.com/api/file/([A-Za-z0-9_-]+)#https://pixeldrain.com/u/\1#g' "$f"
            # any proxy host (eu.cc / gamedrive) /{id} or /api/file/{id} -> /u/{id}
            sed -i -E 's#https?://[A-Za-z0-9.-]*pixeldrain\.eu\.cc/(api/file/)?([A-Za-z0-9_-]+)#https://pixeldrain.com/u/\2#g' "$f"
            sed -i -E 's#https?://pixeldrain-bypass\.gamedrive\.org/(api/file/)?([A-Za-z0-9_-]+)#https://pixeldrain.com/u/\2#g' "$f"
            # strip stray query suffixes (?download / ?embed) on /u/ links
            sed -i -E 's#(https://pixeldrain\.com/u/[A-Za-z0-9_-]+)\?[A-Za-z0-9=&_-]*#\1#g' "$f"
          }
          normalize "data/recordings.json"
          normalize "links.txt"
          echo "Normalization complete."

      - name: 🩺 Health-check streaming proxy
        id: health
        run: |
          set -uo pipefail
          # Pull the first Pixeldrain ID from the database to test against.
          ID="$(grep -oE 'pixeldrain\.com/u/[A-Za-z0-9_-]+' data/recordings.json 2>/dev/null \
                | head -n1 | sed -E 's#.*/u/##')"
          if [ -z "${ID:-}" ]; then
            echo "No Pixeldrain IDs found; skipping live probe."
            ID=""
          fi

          probe() { # $1=url -> echoes "code|ctype"
            curl -s -L -o /dev/null \
              -A "Mozilla/5.0 (compatible; StreamRecorder/2.0)" \
              -w '%{http_code}|%{content_type}' --max-time 30 "$1" 2>/dev/null || echo "000|"
          }

          PROXY_OK="unknown"; OFFICIAL_OK="unknown"
          PROXY_URL=""; OFFICIAL_URL=""
          if [ -n "$ID" ]; then
            PROXY_URL="https://${PROXY_HOST}/${ID}"
            OFFICIAL_URL="https://${OFFICIAL_HOST}/api/file/${ID}"

            P="$(probe "$PROXY_URL")";  PC="${P%%|*}";  PT="${P##*|}"
            O="$(probe "$OFFICIAL_URL")"; OC="${O%%|*}"; OT="${O##*|}"

            echo "Proxy:    $PROXY_URL  -> $PC ($PT)"
            echo "Official: $OFFICIAL_URL -> $OC ($OT)"

            case "$PC|$PT" in 2*\|video/*) PROXY_OK="alive";; *) PROXY_OK="down";; esac
            case "$OC|$OT" in 2*\|video/*) OFFICIAL_OK="alive";; *) OFFICIAL_OK="down";; esac
          fi

          echo "proxy_ok=$PROXY_OK" >> "$GITHUB_OUTPUT"
          echo "official_ok=$OFFICIAL_OK" >> "$GITHUB_OUTPUT"

          mkdir -p data
          cat > data/pixeldrain-proxy.json <<EOF
          {
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "proxy_host": "${PROXY_HOST}",
            "official_host": "${OFFICIAL_HOST}",
            "proxy_status": "${PROXY_OK}",
            "official_status": "${OFFICIAL_OK}",
            "probe_id": "${ID}"
          }
          EOF
          echo "----- data/pixeldrain-proxy.json -----"
          cat data/pixeldrain-proxy.json

      - name: 💾 Commit & push changes
        if: ${{ inputs.dry_run != true }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status -s)" ]]; then
            git add data/recordings.json links.txt data/pixeldrain-proxy.json 2>/dev/null || true
            git add -A
            git commit -m "⚡ pixeldrain: normalize links + proxy health (proxy=${{ steps.health.outputs.proxy_ok }}, official=${{ steps.health.outputs.official_ok }})"
            git push
            echo "Changes pushed."
          else
            echo "Nothing to commit."
          fi

      - name: 📋 Summary
        run: |
          {
            echo "### ⚡ Pixeldrain Fast-Stream Proxy"
            echo ""
            echo "| Endpoint | Host | Status |"
            echo "|---|---|---|"
            echo "| Fast proxy | \`${PROXY_HOST}\` | ${{ steps.health.outputs.proxy_ok }} |"
            echo "| Official direct | \`${OFFICIAL_HOST}\` | ${{ steps.health.outputs.official_ok }} |"
            echo ""
            echo "Player uses the proxy first and auto-fails-over to the official endpoint."
          } >> "$GITHUB_STEP_SUMMARY"
