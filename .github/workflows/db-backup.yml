# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  💾 Database Backup — snapshot the gallery index                              ║
# ║  Keeps timestamped copies of data/recordings.json in data/backups/ so the    ║
# ║  archive index can never be lost. Prunes to the 30 most recent backups.       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "💾 Database Backup"

on:
  push:
    branches: [main]
    paths:
      - "data/recordings.json"
  schedule:
    - cron: "0 3 * * *"   # daily 03:00 UTC safety snapshot
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: db-backup
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  backup:
    runs-on: ubuntu-24.04
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "💾 Snapshot recordings.json"
        run: |
          set -euo pipefail
          [[ -f data/recordings.json ]] || { echo "No recordings.json yet"; exit 0; }
          mkdir -p data/backups
          STAMP=$(date -u '+%Y-%m-%d')
          DEST="data/backups/recordings-${STAMP}.json"
          # Only write if content differs from the latest backup (avoid noise).
          LATEST=$(ls -1t data/backups/recordings-*.json 2>/dev/null | head -1 || true)
          if [[ -n "$LATEST" ]] && cmp -s data/recordings.json "$LATEST"; then
            echo "No change since last backup ($LATEST)."
            exit 0
          fi
          cp data/recordings.json "$DEST"
          # Keep only the 30 newest backups.
          ls -1t data/backups/recordings-*.json | tail -n +31 | xargs -r rm -f
          echo "Backup written: $DEST"

      - name: "⬆️ Commit backup"
        run: |
          if [[ -n "$(git status -s data/backups)" ]]; then
            git config user.name "Stream Recorder Bot"
            git config user.email "bot@stream-recorder.local"
            git add data/backups
            git commit -m "💾 DB backup snapshot — $(date -u '+%Y-%m-%d')"
            git push
            echo "✅ Backup committed."
          else
            echo "Nothing to commit."
          fi
