name: 🟢 GDrive Upload

on:
  workflow_run:
    workflows: ["📡 Stream Recorder"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: gdrive-upload
  cancel-in-progress: false

jobs:
  upload-all:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-api-python-client google-auth

      - name: 🟢 Upload ALL recordings to GDrive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python3 << 'PYSCRIPT'
          import json, os, subprocess, sys, tempfile

          SA_KEY = os.environ.get("GDRIVE_SA_KEY", "")
          FOLDER_ID = os.environ.get("GDRIVE_FOLDER_ID", "")

          if not SA_KEY or not FOLDER_ID:
              print("⏭️ GDRIVE_SA_KEY or GDRIVE_FOLDER_ID not set — skipping")
              sys.exit(0)

          # Write SA key to temp file
          key_file = "/tmp/gdrive_sa.json"
          with open(key_file, "w") as f:
              f.write(SA_KEY)

          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds = service_account.Credentials.from_service_account_file(
              key_file, scopes=["https://www.googleapis.com/auth/drive.file"])
          drive = build("drive", "v3", credentials=creds)

          with open("data/recordings.json") as f:
              recs = json.load(f)

          todo = [r for r in recs if not r.get("gdrive_link") and (r.get("archive_direct") or r.get("archive_node") or r.get("archive_link"))]

          if not todo:
              print("✅ All recordings already have GDrive links")
              sys.exit(0)

          print(f"🟢 Found {len(todo)} recordings to upload to GDrive\n")

          for i, rec in enumerate(todo):
              title = rec.get("title", "Recording")
              vid = rec.get("video_id", "")
              url = rec.get("archive_direct") or rec.get("archive_node") or ""
              if not url and rec.get("archive_link"):
                  url = rec["archive_link"].replace("/details/", "/download/") + "/"

              print(f"\n{'='*60}")
              print(f"🟢 [{i+1}/{len(todo)}] {title}")

              safe = "".join(c if c.isalnum() or c in "._-" else "_" for c in title[:60]) + ".mp4"
              path = f"/tmp/{safe}"

              # Download
              print(f"   📥 Downloading...")
              dl = subprocess.run(["curl", "-L", "--retry", "3", "--max-time", "3600", "-o", path, url], capture_output=True)
              if dl.returncode != 0 or not os.path.exists(path) or os.path.getsize(path) < 10000:
                  print(f"   ❌ Download failed"); continue

              size = os.path.getsize(path)
              print(f"   📦 Downloaded: {size/1024/1024:.0f} MB")

              # Upload to GDrive
              print(f"   ☁️ Uploading to Google Drive...")
              try:
                  media = MediaFileUpload(path, mimetype="video/mp4", resumable=True)
                  file_meta = {"name": safe, "parents": [FOLDER_ID]}
                  gfile = drive.files().create(body=file_meta, media_body=media, fields="id,webViewLink").execute()
                  glink = gfile.get("webViewLink", "")

                  # Make it viewable by anyone with link
                  drive.permissions().create(
                      fileId=gfile["id"],
                      body={"role": "reader", "type": "anyone"}
                  ).execute()

                  if glink:
                      for r in recs:
                          if r.get("video_id") == vid:
                              r["gdrive_link"] = glink; break
                      with open("data/recordings.json", "w") as f:
                          json.dump(recs, f, indent=2)
                      print(f"   ✅ Uploaded → {glink}")
                  else:
                      print(f"   ⚠️ Uploaded but no link")
              except Exception as e:
                  print(f"   ❌ GDrive error: {e}")

              try: os.remove(path)
              except: pass

          print(f"\n✅ GDrive upload complete")
          PYSCRIPT

      - name: 📤 Push updated recordings.json
        run: |
          git config user.name "Stream Recorder Bot"
          git config user.email "bot@stream-recorder"
          git add data/recordings.json
          git diff --cached --quiet || {
            git commit -m "🟢 GDrive mirror: uploaded all recordings"
            git push
          }
