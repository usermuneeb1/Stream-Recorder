# Deploy the public dashboard to GitHub Pages (fixes 404 when Pages is not manually enabled).
name: "🌐 Deploy Dashboard"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: "Publish GitHub Pages"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔧 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: "📦 Install & Build Command Center"
        working-directory: dashboard
        run: |
          npm install
          npm run build

      - name: "🌐 Configure Pages"
        uses: actions/configure-pages@v4

      - name: "📦 Upload site"
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - name: "🚀 Deploy"
        id: deployment
        uses: actions/deploy-pages@v4
