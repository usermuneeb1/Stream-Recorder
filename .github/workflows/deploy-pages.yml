# Deploy the public dashboard to GitHub Pages (fixes 404 when Pages is not manually enabled).
name: "🌐 Deploy Dashboard"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: "Publish GitHub Pages"
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v7

      - name: "🔧 Setup Node.js"
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: "📡 Generate RSS / podcast / sitemap feeds"
        run: python3 scripts/generate-feeds.py

      - name: "📦 Install & Build Command Center"
        working-directory: dashboard
        run: |
          npm install
          npm run build

      - name: "🌐 Configure Pages"
        uses: actions/configure-pages@v6

      - name: "📦 Upload site"
        uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard/dist

      - name: "🚀 Deploy"
        id: deployment
        uses: actions/deploy-pages@v5
