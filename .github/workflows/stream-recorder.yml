# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📡 AUTOMATED STREAM RECORDER — MAIN WORKFLOW                              ║
# ║  Runs every 5 minutes (Thu-Sun) to check for live streams and record them. ║
# ║  Full lifecycle: Detect → Record → Process → Upload → Notify → Archive    ║
# ║                                                                            ║
# ║  Author : Muneeb Ahmad                                                    ║
# ║  Version: 2.0.0                                                           ║
# ║  Repo   : Public (unlimited GitHub Actions minutes)                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "☪️ The Muslim Lantern — Stream Recorder"

# ═══════════════════════════════════════════════════════════════════════════════
#  TRIGGERS
# ═══════════════════════════════════════════════════════════════════════════════

on:
  # Scheduled: Every 5 minutes. GitHub silently throttles this on inactive
  # repos — see https://docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows#schedule
  # We supplement with repository_dispatch from an external 5-min pinger
  # (see PINGER.md) which is NOT throttled, giving real 5-min coverage.
  schedule:
    - cron: "*/5 * * * *"

  # External pinger trigger — call this via:
  #   POST /repos/usermuneeb1/Stream-Recorder/dispatches
  #   { "event_type": "ping-recorder" }
  # The pinger fires every 5 min from cron-job.org (or any external scheduler)
  # which bypasses GitHub's silent cron throttling entirely.
  repository_dispatch:
    types: [ping-recorder]

  # Manual trigger — run manually, optionally waiting for the stream to go live
  workflow_dispatch:
    inputs:
      force_record:
        description: "Force recording even if not live (for testing)"
        required: false
        default: "false"
        type: boolean
      wait_for_live:
        description: "Wait for live (poll up to 5h checking every 60s)"
        required: false
        default: "false"
        type: boolean
      wait_max_hours:
        description: "Max hours to wait (1-5, default 5)"
        required: false
        default: "5"
        type: string
      custom_duration_minutes:
        description: "X minutes to record then stop (0 = infinite)"
        required: false
        default: "0"
        type: string
      save_test_links:
        description: "Save recording links to links.txt database"
        required: false
        default: "true"
        type: boolean

# ═══════════════════════════════════════════════════════════════════════════════
#  CONCURRENCY — Only one recording at a time, never cancel running jobs
# ═══════════════════════════════════════════════════════════════════════════════

concurrency:
  group: stream-recorder
  cancel-in-progress: false

# ═══════════════════════════════════════════════════════════════════════════════
#  ENVIRONMENT VARIABLES (from secrets)
# ═══════════════════════════════════════════════════════════════════════════════

env:
  # Main webhook (fallback if specific channels not set)
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  # Channel-specific webhooks (optional — falls back to main if not set)
  DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
  DISCORD_WEBHOOK_LINKS: ${{ secrets.DISCORD_WEBHOOK_LINKS }}
  DISCORD_WEBHOOK_RECORDINGS: ${{ secrets.DISCORD_WEBHOOK_RECORDINGS }}
  DISCORD_WEBHOOK_REFRESH: ${{ secrets.DISCORD_WEBHOOK_REFRESH }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  # YouTube & Cloud
  YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
  YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
  ARCHIVE_ACCESS_KEY: ${{ secrets.ARCHIVE_ACCESS_KEY }}
  ARCHIVE_SECRET_KEY: ${{ secrets.ARCHIVE_SECRET_KEY }}
  # MEGA.nz (PERMANENT — 20GB free, auto-rotating accounts)
  MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
  MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
  # Pixeldrain (60-day retention, 10GB/file)
  PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  WARP_LICENSE_KEY: ${{ secrets.WARP_LICENSE_KEY }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  RECORD_DIR: /tmp/stream-recorder
  COOKIES_FILE: cookies.txt
  # Permanent cookieless mode — the channel only streams public broadcasts.
  # HYBRID mode (default 'false'): cookieless methods try first, cookie
  # methods (A/B) catch sign-in-required streams as fallback. Real failure on
  # 2026-06-27 stream WOqZf9Myz_c returned LOGIN_REQUIRED — pure cookieless
  # mode could never have recorded it. Set repo variable
  # PUBLIC_STREAM_ONLY=true ONLY if you're certain all streams are fully
  # public AND never restricted.
  PUBLIC_STREAM_ONLY: ${{ vars.PUBLIC_STREAM_ONLY || 'false' }}
  TZ: Asia/Karachi

# ═══════════════════════════════════════════════════════════════════════════════
#  JOBS
# ═══════════════════════════════════════════════════════════════════════════════

jobs:
  record:
    name: "🎬 Detect & Record"
    runs-on: ubuntu-24.04
    timeout-minutes: 360   # 6 hours max

    permissions:
      contents: write
      actions: write

    steps:
      # ─── 0. AUTO-CLEANUP OLD RUNS ────────────────────────────────────────
      - name: "🧹 Cleanup Old Workflow Runs"
        continue-on-error: true
        run: |
          # Delete old completed runs to keep Actions tab clean (keep latest 5).
          # This step is intentionally best-effort and must never block recording.
          echo "🧹 Cleaning up old workflow runs..."
          if [[ -z "${GH_PAT:-}" ]]; then
            echo "ℹ️ GH_PAT not set — skipping workflow cleanup"
            exit 0
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "ℹ️ jq not available yet — skipping workflow cleanup"
            exit 0
          fi
          RUNS=$(curl -fsS -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=50&status=completed" \
            | jq -r '.workflow_runs[5:] | .[].id' 2>/dev/null) || true
          
          deleted=0
          for run_id in $RUNS; do
            curl -fsS -X DELETE -H "Authorization: token ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >/dev/null 2>&1 && ((deleted++)) || true
          done
          echo "✅ Deleted ${deleted} old runs"

      # ─── 1. CHECKOUT REPOSITORY ──────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ─── 2. INSTALL DEPENDENCIES ─────────────────────────────────────────
      - name: "📦 Install Dependencies"
        # IMPORTANT: do NOT use `set -e` here. The install step has several
        # best-effort operations (pip installs, /tmp cleanup, root-owned file
        # removal) and a single benign failure was killing the whole job and
        # losing a live recording (2026-06-26 incident). Each critical
        # install below has its own verification fallback.
        shell: bash {0}
        run: |
          set -u   # catch undefined vars, but NOT -e (no abort on cmd failure)
          set +o pipefail
          echo "📦 Installing required tools..."

          # Update package list
          sudo apt-get update -qq || echo "::warning::apt update returned non-zero (continuing)"

          # Install core tools (nodejs is pre-installed on GitHub runners)
          sudo apt-get install -y -qq ffmpeg jq bc curl python3 megatools

          # Install yt-dlp (nightly build for latest YouTube anti-bot patches)
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp 2>/dev/null || \
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

          # ── NEW: Install ytarchive (purpose-built YouTube live archiver) ──
          # Independent Go binary; far more robust for live streams than yt-dlp.
          YTA_VER="0.5.0"
          sudo curl -L "https://github.com/Kethsar/ytarchive/releases/download/v${YTA_VER}/ytarchive_linux_amd64.zip" -o /tmp/ytarchive.zip
          sudo unzip -o /tmp/ytarchive.zip -d /usr/local/bin/
          sudo chmod a+rx /usr/local/bin/ytarchive
          # NOTE: use sudo + `|| true` because /tmp/ytarchive.zip was created by
          # `sudo curl` so it's owned by root. A bare `rm -f` from the runner user
          # would fail with "Operation not permitted" and abort the entire
          # install step under bash -e (this lost us a recording on 2026-06-26).
          sudo rm -f /tmp/ytarchive.zip || true

          # Install yt-dlp PO token / nsig challenge solver
          pip3 install --quiet bgutil-ytdlp-pot-provider 2>/dev/null || true

          # Install streamlink and chat-downloader
          pip3 install --quiet streamlink chat-downloader

          # Strip Windows CRLF line endings — these corrupt JSON payloads
          sed -i 's/\r$//' scripts/*.sh scripts/*.env 2>/dev/null || true

          # Make scripts executable
          chmod +x scripts/*.sh

          # Verify installations
          echo "──────────────────────────────────────"
          echo "yt-dlp     version: $(yt-dlp --version 2>&1 || echo 'MISSING')"
          echo "ytarchive  version: $(ytarchive --version 2>&1 | head -1 || echo 'N/A')"
          echo "ffmpeg     version: $(ffmpeg -version 2>&1 | head -1 || echo 'MISSING')"
          echo "streamlink version: $(streamlink --version 2>/dev/null || echo 'N/A')"
          echo "jq         version: $(jq --version 2>&1 || echo 'MISSING')"
          echo "node       version: $(node --version 2>/dev/null || echo 'N/A')"
          echo "──────────────────────────────────────"

          # ── CRITICAL TOOL GATE ──
          # The recorder MUST have at least one of (yt-dlp | streamlink) and
          # ffmpeg + jq to function. Fail the workflow ONLY if these are
          # actually missing. ytarchive is optional (Method H falls back to
          # Methods I/D/C/G/E/F if missing).
          MISSING=()
          command -v ffmpeg >/dev/null || MISSING+=("ffmpeg")
          command -v jq     >/dev/null || MISSING+=("jq")
          if ! command -v yt-dlp >/dev/null && ! command -v streamlink >/dev/null; then
            MISSING+=("yt-dlp OR streamlink")
          fi
          if (( ${#MISSING[@]} > 0 )); then
            echo "::error::Critical tools missing: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All critical tools present — recording can proceed"

      - name: "🛡️ Start PoToken Provider"
        id: pot
        # v4: 3-attempt restart loop + install guard. If still failing, set POT_PROVIDER_READY=false
        # so the diagnostic dump catches it.
        run: |
          # Ensure package is installed (idempotent, survives runner image changes)
          pip3 install --quiet bgutil-ytdlp-pot-provider 2>/dev/null || true

          for i in 1 2 3; do
            pkill -f bgutil_ytdlp_pot_provider 2>/dev/null || true
            (python3 -m bgutil_ytdlp_pot_provider --host 127.0.0.1 --port 4416 \
              >/tmp/pot.log 2>&1 &)
            sleep 3
            if curl -fsS --max-time 2 http://127.0.0.1:4416/ping >/dev/null 2>&1; then
              echo "✅ PoToken provider: listening on 127.0.0.1:4416 (attempt $i)"
              echo "POT_PROVIDER_READY=true" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "⚠️  PoToken attempt $i failed, retrying..."
            sleep 2
          done
          echo "::error::PoToken provider failed after 3 attempts — yt-dlp may return LOGIN_REQUIRED"
          echo "POT_PROVIDER_READY=false" >> "$GITHUB_ENV"
          echo "Continuing anyway — ytarchive + streamlink don't need PoToken"

      - name: "💾 Check Disk Space"
        id: disk_check
        run: |
          source scripts/utils.sh
          
          log_header "💾 DISK SPACE CHECK"
          
          available=$(get_disk_space_gb)
          total=$(get_total_disk_gb)
          used=$(get_disk_used_percent)
          
          echo "disk_space=${available}" >> $GITHUB_OUTPUT
          echo "DISK_SPACE_GB=${available}" >> $GITHUB_ENV
          
          log_info "Available: ${available} GB / ${total} GB (${used}% used)"
          
          if ! check_disk_space 3; then
            log_error "Insufficient disk space — aborting"
            echo "disk_ok=false" >> $GITHUB_OUTPUT
            echo "DISK_LOW=true" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "disk_ok=true" >> $GITHUB_OUTPUT

      - name: "⚠️ Notify — Low Disk Space"
        if: steps.disk_check.outputs.disk_ok != 'true'
        continue-on-error: true
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh
          notify_system_health "disk_low" "Runner has less than ${MIN_DISK_SPACE_GB:-3} GB free — recording skipped."

      # ─── 5. PREPARE COOKIES ──────────────────────────────────────────────
      - name: "🍪 Prepare Cookies"
        if: steps.disk_check.outputs.disk_ok == 'true'
        run: |
          source scripts/utils.sh
          
          log_header "🍪 COOKIE PREPARATION"
          
          if [[ -n "${YOUTUBE_COOKIES:-}" ]]; then
            # Try base64 decode first, then fall back to plaintext
            if echo "$YOUTUBE_COOKIES" | base64 -d > cookies_b64.tmp 2>/dev/null && \
               [[ -s cookies_b64.tmp ]] && \
               head -1 cookies_b64.tmp | grep -qi "netscape\|mozilla\|#\|\.youtube"; then
              mv cookies_b64.tmp cookies.txt
              chmod 600 cookies.txt
              log_ok "Cookies decoded from base64"
            else
              rm -f cookies_b64.tmp
              # Plaintext cookies (same as cookie-keepalive). Use printf to avoid
              # shell-specific echo escaping and preserve Netscape cookie rows.
              printf '%s\n' "$YOUTUBE_COOKIES" > cookies.txt
              chmod 600 cookies.txt
              log_ok "Cookies stored as plaintext"
            fi
            
            if [[ -f cookies.txt ]] && [[ -s cookies.txt ]]; then
              line_count=$(wc -l < cookies.txt)
              log_ok "Cookies prepared: ${line_count} lines"
              
              # Validate cookie format
              if head -1 cookies.txt | grep -qi "netscape\|mozilla\|#"; then
                log_ok "Cookie format validated (Netscape/Mozilla)"
              else
                log_warn "Cookie format may be invalid — proceeding anyway"
              fi
            else
              log_warn "Cookie file is empty"
              rm -f cookies.txt
            fi
          else
            log_info "No YOUTUBE_COOKIES secret set — will use cookieless methods"
          fi

      # ─── 5b. CHECK COOKIE HEALTH ──────────────────────────────────────────
      - name: "🍪 Check Cookie Health"
        if: steps.disk_check.outputs.disk_ok == 'true'
        continue-on-error: true
        run: bash scripts/check-cookies.sh

      # ─── 5c. SETUP CLOUDFLARE WARP (HARD REQUIREMENT in v4) ──────────────────
      # Masks GitHub Actions IP. If WARP cannot install, register, connect,
      # or change our IP, we ABORT — proceeding with raw GitHub IP is
      # pointless because YouTube blocks every yt-dlp/ytarchive/streamlink
      # client on it. (v4: removed `continue-on-error: true`)
      - name: "🌐 Setup Cloudflare WARP"
        id: warp
        if: steps.disk_check.outputs.disk_ok == 'true'
        run: bash scripts/setup-warp.sh

      - name: "⛔ Abort — WARP Failed"
        if: steps.warp.outcome == 'failure'
        run: |
          echo "::error::WARP did not connect — every recording method would fail"
          echo "::error::Aborting. Verify WARP availability in your runner region."
          echo "::error::If WARP cannot connect, set ENABLE_WARP=false (not recommended)"
          exit 1

      # ─── 6. DETECT LIVE STREAM ───────────────────────────────────────────
      - name: "🔍 Detect Live Stream"
        id: detect
        if: steps.disk_check.outputs.disk_ok == 'true'
        timeout-minutes: 310
        run: |
          export FORCE_RECORD="${{ github.event.inputs.force_record }}"
          WAIT_MODE="${{ github.event.inputs.wait_for_live }}"
          MAX_H="${{ github.event.inputs.wait_max_hours }}"
          MAX_H="${MAX_H:-5}"
          # Clamp between 1 and 5
          [[ "$MAX_H" -lt 1 ]] 2>/dev/null && MAX_H=1
          [[ "$MAX_H" -gt 5 ]] 2>/dev/null && MAX_H=5

          # ── AUTO WAIT-FOR-LIVE on scheduled / repository_dispatch triggers ──
          # GitHub Actions silently throttles cron schedules on inactive repos:
          # our `*/5 * * * *` cron actually fired only 2 times in 24h on
          # 2026-06-27 (instead of ~288). That's why a live stream was missed.
          # Mitigation: when the workflow IS triggered (by ANY non-manual
          # event), it polls for the stream for up to 1 hour before exiting.
          # Combined with an external 5-min pinger hitting
          # repository_dispatch, this gives near-continuous coverage even
          # when GitHub silently skips cron ticks.
          if [[ "$WAIT_MODE" != "true" ]] && [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "🕐 Auto wait-for-live (scheduled trigger) — polling for 1h"
            WAIT_MODE="true"
            MAX_H=1
          fi

          if [[ "$WAIT_MODE" == "true" ]]; then
            echo "🕐 Wait-for-live mode: polling every 60s for up to ${MAX_H}h…"
            MAX_POLLS=$(( MAX_H * 60 ))
            POLL=0
            while (( POLL < MAX_POLLS )); do
              bash scripts/detect-stream.sh
              # detect-stream.sh sets is_live in GITHUB_OUTPUT — check it
              if grep -q "is_live=true" "$GITHUB_OUTPUT" 2>/dev/null; then
                echo "✅ Stream is LIVE — proceeding to record!"
                break
              fi
              POLL=$(( POLL + 1 ))
              echo "[poll $POLL/$MAX_POLLS] Not live yet — sleeping 60s…"
              sleep 60
            done
          else
            bash scripts/detect-stream.sh
          fi

      # ─── 7. SEND LIVE DETECTED NOTIFICATION ──────────────────────────────
      - name: "🔴 Notify — Live Detected"
        if: steps.detect.outputs.is_live == 'true'
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh
          notify_live_detected

      # ─── 7b. RECHECK LIVE (defense against race condition) ──────────────────
      # v4: detection → recording has a 30-60s gap. If the stream ends in
      # that gap, recording starts on a dead stream and burns 30+ min on a
      # doomed run. Re-verify it is STILL live right before recording.
      # (This race condition lost HbS5TF1atFU on 2026-07-04.)
      - name: "🔁 Recheck — Still Live?"
        id: recheck
        if: steps.detect.outputs.is_live == 'true'
        timeout-minutes: 5
        run: |
          source scripts/utils.sh
          log_header "🔁 LIVE RECHECK"
          sleep 15
          if is_stream_still_live "${{ steps.detect.outputs.video_id }}"; then
            log_ok "Stream is still live — proceeding to record"
            echo "still_live=true" >> "$GITHUB_OUTPUT"
          else
            log_warn "Stream ended between detection and recording — skipping"
            echo "still_live=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "⏭️  Skip Recording — Stream Ended Mid-Race"
        if: steps.recheck.outputs.still_live == 'false'
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh
          notify_recording_failed \
            "Stream ended during detection→recording race window" \
            "Will retry on next 5-min ping. No manual action needed."


      # ─── 8. RECORD THE STREAM ────────────────────────────────────────────
      - name: "🎬 Record Stream"
        id: record
        if: steps.detect.outputs.is_live == 'true' && steps.recheck.outputs.still_live != 'false'
        timeout-minutes: 300  # 5 hours max for recording
        continue-on-error: true
        run: |
          CUSTOM_DUR="${{ github.event.inputs.custom_duration_minutes }}"
          if [[ -n "$CUSTOM_DUR" && "$CUSTOM_DUR" != "0" ]]; then
            export MAX_RECORD_DURATION=$(( CUSTOM_DUR * 60 ))
            export CUSTOM_DURATION_MODE=true
            export MAX_RECORD_ATTEMPTS=1
            echo "⏱️ Custom duration active: Recording from NOW for $CUSTOM_DUR minutes (no --live-from-start, single attempt)."
          fi
          bash scripts/record-stream.sh

      # ─── 9. POST-PROCESS ──────────────────────────────────────────────────
      - name: "⚙️ Post-Process"
        id: process
        if: steps.record.outputs.recording_success == 'true'
        run: bash scripts/post-process.sh

      # ─── 10. UPLOAD TO CLOUDS ───────────────────────────────────────────
      - name: "☁️ Upload to Clouds"
        id: upload
        if: steps.record.outputs.recording_success == 'true' && steps.process.outcome == 'success'
        continue-on-error: true
        run: bash scripts/upload-clouds.sh

      # ─── 11. SEND COMPLETE NOTIFICATION ─────────────────────────────────
      - name: "✅ Notify — Recording Complete"
        if: steps.record.outputs.recording_success == 'true' && steps.process.outcome == 'success'
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh
          notify_recording_complete

      # ─── 12. UPDATE STATISTICS ──────────────────────────────────────────
      - name: "📊 Update Statistics"
        if: steps.record.outputs.recording_success == 'true' && steps.process.outcome == 'success'
        continue-on-error: true
        run: bash scripts/update-stats.sh

      # ─── 13. ARCHIVE LINKS ──────────────────────────────────────────────
      - name: "🔗 Archive Links"
        if: steps.record.outputs.recording_success == 'true' && steps.process.outcome == 'success'
        continue-on-error: true
        run: |
          SAVE_LINKS="${{ github.event.inputs.save_test_links }}"
          if [[ "$SAVE_LINKS" == "false" ]]; then
            echo "⏭️ save_test_links is false. Skipping links.txt database update."
          else
            bash scripts/update-links.sh
          fi

      # ─── 14. SEND FAILED NOTIFICATION (with diagnostics) ─────────────────
      # v4: include WHY each method failed. Was: "All recording methods failed"
      # (useless — no info about WHY). Now: includes WARP, PoToken, cookie,
      # IP state, plus last 50 lines of per-method failure log.
      - name: "❌ Notify — Recording Failed"
        if: steps.detect.outputs.is_live == 'true' && steps.record.outputs.recording_success != 'true'
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh

          method_log="${METHOD_FAILURE_LOG:-/tmp/stream-recorder/method_logs/failures.log}"
          failures=""
          if [[ -f "$method_log" ]]; then
            failures=$(tail -50 "$method_log" 2>/dev/null | head -c 1500 || echo "log unreadable")
          fi

          warp_state="${WARP_CONNECTED:-unknown}"
          pot_state="${POT_PROVIDER_READY:-unknown}"
          ip_state="${WARP_IP:-${ORIGINAL_IP:-unknown}}"
          cookie_state="${COOKIE_STATUS:-unknown}"

          # Build diagnostic using printf so we avoid colons in YAML literal block.
          detail=$(printf "**Diagnostic dump:**\n\`\`\`\nWARP\\: %s\\nIP\\: %s\\nPoToken\\: %s\\nCookies\\: %s\n\`\`\`\n**Last method failures:**\n\`\`\`\n%s\n\`\`\`\nAuto-retry dispatched." \
            "$warp_state" "$ip_state" "$pot_state" "$cookie_state" "${failures:-no log captured}")

          notify_recording_failed "Recording failed" "$detail"

      # ─── 15. AUTO-RETRY ON FAILURE ────────────────────────────────────────
      - name: "🔄 Auto-Retry on Failure"
        if: steps.detect.outputs.is_live == 'true' && steps.record.outputs.recording_success != 'true'
        continue-on-error: true
        run: |
          source scripts/utils.sh
          
          log_header "🔄 AUTO-RETRY"
          log_info "Stream was live but recording failed — dispatching new workflow run..."
          log_info "(Current run will finish cleanup, then new run will start)"
          
          # Fire-and-forget dispatch — new run queued by concurrency group after this one ends
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${GH_PAT}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/stream-recorder.yml/dispatches" \
            -d '{"ref":"main"}' && \
            log_ok "Retry dispatched — will start after this run finishes" || \
            log_warn "Failed to dispatch retry — next scheduled run (in 5 min) will retry"

      # ─── 16. CLEANUP (ALWAYS RUNS) ───────────────────────────────────────
      - name: "🧹 Cleanup"
        if: always()
        run: |
          source scripts/utils.sh
          
          log_header "🧹 CLEANUP"
          
          # Remove all media files
          rm -f *.mp4 *.webm *.mkv *.ts *.m4a *.flv *.part 2>/dev/null
          rm -f cookies.txt 2>/dev/null
          rm -rf /tmp/stream-recorder 2>/dev/null
          rm -rf /tmp/yt-dlp-* 2>/dev/null
          
          # Report final disk space
          log_info "Final disk space: $(get_disk_space_gb) GB free"
          log_ok "Cleanup complete"

      # ─── 17. RUN SUMMARY ─────────────────────────────────────────────────
      - name: "📋 Run Summary"
        if: always()
        run: |
          source scripts/utils.sh
          
          log_header "📋 RUN SUMMARY"
          log_info "Completed at  : $(now_pkt)"
          log_info "Stream live   : ${STREAM_IS_LIVE:-false}"
          log_info "Recorded      : ${RECORDING_SUCCESS:-false}"
          log_info "Duration      : ${RECORD_DURATION_FMT:-N/A}"
          log_info "File size     : ${RECORD_SIZE_HUMAN:-N/A}"
          log_info "Parts         : ${RECORD_PARTS:-N/A}"
          log_info "Uploads       : ${UPLOAD_SUCCESS_COUNT:-0}/${UPLOAD_TOTAL_SERVICES:-3}"
          log_info "WARP          : ${WARP_CONNECTED:-false}"
          log_info "Disk space    : $(get_disk_space_gb 2>/dev/null || echo 'N/A') GB"
          
          # Write to Job Summary
          echo "## ☪️ The Muslim Lantern — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ Time | $(now_pkt) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📺 Stream Live | ${STREAM_IS_LIVE:-false} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎬 Recorded | ${RECORDING_SUCCESS:-false} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ Duration | ${RECORD_DURATION_FMT:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Size | ${RECORD_SIZE_HUMAN:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️ Uploads | ${UPLOAD_SUCCESS_COUNT:-0}/${UPLOAD_TOTAL_SERVICES:-3} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 WARP | ${WARP_CONNECTED:-false} |" >> $GITHUB_STEP_SUMMARY
