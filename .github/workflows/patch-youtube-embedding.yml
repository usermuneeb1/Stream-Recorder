name: "🔧 Patch YouTube Embedding"

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Google API client
        run: pip3 install --quiet google-auth google-auth-oauthlib google-api-python-client

      - name: Extract YouTube credentials
        id: creds
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: python3 scripts/youtube_extract_creds.py

      - name: Delete non-embeddable videos + clear from recordings.json
        env:
          YOUTUBE_CLIENT_ID: ${{ steps.creds.outputs.client_id }}
          YOUTUBE_CLIENT_SECRET: ${{ steps.creds.outputs.client_secret }}
          YOUTUBE_REFRESH_TOKEN: ${{ steps.creds.outputs.refresh_token }}
        run: python3 scripts/patch_youtube_embedding.py

      - name: Commit cleaned recordings.json
        run: |
          git config user.name  "Stream Recorder Bot"
          git config user.email "stream-recorder-bot@users.noreply.github.com"
          if ! git diff --quiet -- data/recordings.json; then
            git add data/recordings.json
            git commit -m "🔧 Reset youtube_id/youtube_unlisted for non-embeddable videos"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Trigger ghost-host workflow to re-upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/youtube-ghost-host.yml/dispatches" \
            -d '{"ref":"main","inputs":{"skip_morph":"true"}}'
          echo "ghost-host workflow triggered"
