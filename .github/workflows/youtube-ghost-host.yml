name: "👻 YouTube Ghost-Host"

on:
  workflow_dispatch:
    inputs:
      skip_morph:
        description: "Skip morphing (upload clean)"
        required: false
        default: "true"

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  TZ: Asia/Karachi

permissions:
  contents: write

jobs:
  ghost-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq curl python3-pip aria2
          pip3 install --quiet google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Extract YouTube credentials
        id: creds
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: python3 scripts/youtube_extract_creds.py

      - name: Upload ALL recordings
        env:
          YOUTUBE_CLIENT_ID: ${{ steps.creds.outputs.client_id }}
          YOUTUBE_CLIENT_SECRET: ${{ steps.creds.outputs.client_secret }}
          YOUTUBE_REFRESH_TOKEN: ${{ steps.creds.outputs.refresh_token }}
          SKIP_MORPH: ${{ github.event.inputs.skip_morph }}
        run: |
          python3 -c "
          import json, os, subprocess, sys

          with open('data/recordings.json') as f:
              recs = json.load(f)

          todo = [r for r in recs if not r.get('youtube_unlisted') and not r.get('youtube_id')
                  and (r.get('archive_node') or r.get('archive_direct') or r.get('archive_link'))]

          if not todo:
              print('All recordings already have YouTube mirrors')
              sys.exit(0)

          print(f'Found {len(todo)} recordings to ghost-host')
          skip = os.environ.get('SKIP_MORPH', 'true') == 'true'

          for i, rec in enumerate(todo):
              title = rec.get('title', 'Recording')
              vid = rec.get('video_id', '')
              url = rec.get('archive_node') or rec.get('archive_direct') or ''
              if not url and rec.get('archive_link'):
                  url = rec['archive_link'].replace('/details/', '/download/') + '/'

              print(f'\n{\"=\"*60}')
              print(f'[{i+1}/{len(todo)}] {title}')
              print(f'   Downloading...')
              subprocess.run(['curl', '-L', '--retry', '3', '--max-time', '3600', '-o', '/tmp/input.mp4', url], capture_output=True)

              if not os.path.exists('/tmp/input.mp4') or os.path.getsize('/tmp/input.mp4') < 10000:
                  print('   Download failed'); continue

              print(f'   Downloaded: {os.path.getsize(\"/tmp/input.mp4\")/1024/1024:.0f} MB')

              env = os.environ.copy()
              if skip: env['SKIP_MORPH'] = 'true'
              print(f'   Morphing...')
              subprocess.run(['python3', 'scripts/morph_video.py', '/tmp/input.mp4', '/tmp/morphed.mp4'], env=env)

              if not os.path.exists('/tmp/morphed.mp4'):
                  print('   Morph failed'); os.remove('/tmp/input.mp4'); continue

              print('   Uploading to YouTube...')
              env['YOUTUBE_UPLOAD_TITLE'] = f'Archive Backup - {title}'
              up = subprocess.run(['python3', 'scripts/upload_to_youtube.py', '/tmp/morphed.mp4'], env=env, capture_output=True, text=True)

              yt_id = ''
              for line in (up.stdout or '').split('\n'):
                  if line.startswith('VIDEO_ID='): yt_id = line.split('=', 1)[1].strip()

              if yt_id:
                  for r in recs:
                      if r.get('video_id') == vid:
                          r['youtube_id'] = yt_id
                          r['youtube_unlisted'] = f'https://youtu.be/{yt_id}'
                  with open('data/recordings.json', 'w') as f:
                      json.dump(recs, f, indent=2)
                  print(f'   Uploaded: https://youtu.be/{yt_id}')
              else:
                  print('   Upload failed')
                  if up.stdout: print(f'   {up.stdout[:300]}')
                  if up.stderr: print(f'   {up.stderr[:300]}')

              for f in ['/tmp/input.mp4', '/tmp/morphed.mp4']:
                  try: os.remove(f)
                  except: pass

          print('Done')
          "

      - name: Push
        run: |
          git config user.name "Stream Recorder Bot"
          git config user.email "bot@stream-recorder"
          git add data/recordings.json
          git diff --cached --quiet || { git commit -m "👻 YouTube Ghost-Host: all recordings" && git push; }
