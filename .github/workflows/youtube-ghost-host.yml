name: "👻 YouTube Ghost-Host"

on:
  # AUTO-TRIGGER: after every successful Stream Recorder run, attempt to
  # ghost-host any new recordings that landed in data/recordings.json.
  # The script itself skips anything that already has a youtube_id, so
  # this is safe to run on every recording event — never re-uploads.
  workflow_run:
    workflows: ["☪️ The Muslim Lantern — Stream Recorder"]
    types: [completed]
  workflow_dispatch:
    inputs:
      skip_morph:
        description: "Skip morphing (upload clean)"
        required: false
        default: "true"
      force_upload_long:
        description: "Upload videos > 15min even if YOUTUBE_VERIFIED is false (will fail if account not phone-verified)"
        required: false
        default: "false"
        type: boolean

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  TZ: Asia/Karachi
  # 🔐 Phone-verified YouTube accounts can upload up to 12h / 256 GB per video.
  # Unverified accounts are capped at 15 minutes per upload.
  # Set repo Variable YOUTUBE_VERIFIED=true once your channel is phone-verified
  # (Settings → Variables → Actions → New repository variable).
  # Until then, this workflow will skip videos > 15min instead of trying and
  # failing silently — which is what was happening before.
  YOUTUBE_VERIFIED: ${{ vars.YOUTUBE_VERIFIED || 'false' }}

permissions:
  contents: write

jobs:
  ghost-all:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    # Skip the auto-trigger when the parent Stream Recorder failed —
    # there's nothing new to ghost-host. Always allow manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq curl python3-pip aria2
          pip3 install --quiet google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Extract YouTube credentials
        id: creds
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: python3 scripts/youtube_extract_creds.py

      - name: Upload ALL recordings
        env:
          YOUTUBE_CLIENT_ID: ${{ steps.creds.outputs.client_id }}
          YOUTUBE_CLIENT_SECRET: ${{ steps.creds.outputs.client_secret }}
          YOUTUBE_REFRESH_TOKEN: ${{ steps.creds.outputs.refresh_token }}
          SKIP_MORPH: ${{ github.event.inputs.skip_morph }}
          YOUTUBE_VERIFIED: ${{ env.YOUTUBE_VERIFIED }}
          FORCE_UPLOAD_LONG: ${{ github.event.inputs.force_upload_long || 'false' }}
        run: |
          python3 -c "
          import json, os, subprocess, sys

          with open('data/recordings.json') as f:
              recs = json.load(f)

          # ── Duration gating ─────────────────────────────────────────────
          # Unverified YouTube accounts: 15 min hard cap per upload.
          # Phone-verified accounts:     up to 12 hours per upload.
          # See https://support.google.com/youtube/answer/71673
          VERIFIED = os.environ.get('YOUTUBE_VERIFIED', 'false').lower() in ('true', '1', 'yes')
          FORCE    = os.environ.get('FORCE_UPLOAD_LONG', 'false').lower() in ('true', '1', 'yes')
          MAX_SEC_UNVERIFIED = 15 * 60          # 15 min
          MAX_SEC_VERIFIED   = 12 * 3600        # 12 h (YouTube's actual ceiling)
          duration_cap = MAX_SEC_VERIFIED if VERIFIED else MAX_SEC_UNVERIFIED

          print(f'YOUTUBE_VERIFIED={VERIFIED}   duration_cap={duration_cap//60}min')

          eligible = []
          skipped_too_long = []
          for r in recs:
              if r.get('youtube_unlisted') or r.get('youtube_id'):
                  continue
              if not (r.get('archive_node') or r.get('archive_direct') or r.get('archive_link')):
                  continue
              dur = int(r.get('duration_sec', 0) or 0)
              if dur > duration_cap and not FORCE:
                  skipped_too_long.append((r.get('video_id',''), r.get('title','')[:60], dur//60))
                  continue
              eligible.append(r)

          if skipped_too_long:
              print(f'\\n⚠️  Skipping {len(skipped_too_long)} recording(s) — too long for current account verification:')
              for vid, t, m in skipped_too_long[:20]:
                  print(f'    • {vid}  ({m} min)  {t}')
              if not VERIFIED:
                  print('\\n   To unlock long uploads:')
                  print('   1. Verify your YouTube channel by phone:')
                  print('      https://www.youtube.com/verify')
                  print('   2. In this repo: Settings → Variables → Actions →')
                  print('      New repository variable → YOUTUBE_VERIFIED = true')
                  print('   3. Re-run this workflow.\\n')

          todo = eligible
          if not todo:
              print('Nothing eligible to ghost-host this run.')
              sys.exit(0)

          print(f'Found {len(todo)} recordings to ghost-host')
          skip = os.environ.get('SKIP_MORPH', 'true') == 'true'

          import urllib.request, urllib.error
          def resolve_archive_mp4(rec):
              # Prefer the direct mp4 URLs that update-links.sh writes.
              for key in ('archive_node', 'archive_direct'):
                  u = rec.get(key)
                  if u and u.endswith('.mp4'):
                      return u
              # Fall back to the /details/<id> page → list files via the
              # public metadata API → pick the biggest .mp4 (the original).
              link = rec.get('archive_link', '')
              m = link.rstrip('/').rsplit('/', 1)[-1] if '/details/' in link else None
              if not m:
                  return ''
              try:
                  with urllib.request.urlopen(f'https://archive.org/metadata/{m}', timeout=30) as r:
                      meta = json.loads(r.read())
              except Exception as e:
                  print(f'   metadata API failed: {e}')
                  return ''
              files = meta.get('files', [])
              mp4s = [f for f in files if f.get('name', '').lower().endswith('.mp4')]
              if not mp4s:
                  return ''
              # The biggest mp4 is virtually always the original (not a
              # derivative). 'size' is a string in the metadata API.
              mp4s.sort(key=lambda f: int(f.get('size', 0) or 0), reverse=True)
              return f\"https://archive.org/download/{m}/{mp4s[0]['name']}\"

          for i, rec in enumerate(todo):
              title = rec.get('title', 'Recording')
              vid = rec.get('video_id', '')
              url = resolve_archive_mp4(rec)

              print(f'\n{\"=\"*60}')
              print(f'[{i+1}/{len(todo)}] {title}')
              if not url:
                  print('   Could not resolve a direct mp4 URL — skipping'); continue
              print(f'   URL: {url[:120]}')
              print(f'   Downloading...')
              dl = subprocess.run(
                  ['curl', '-L', '--fail', '--retry', '3', '--retry-delay', '5',
                   '--max-time', '3600', '-o', '/tmp/input.mp4', url],
                  capture_output=True, text=True,
              )
              if dl.returncode != 0:
                  print(f'   curl failed (exit {dl.returncode}): {(dl.stderr or \"\")[:200]}')
                  continue

              # Require ≥10 MB and a real mp4 magic header — guards against
              # accidentally downloading an HTML error page or directory
              # listing that happens to be > 10 KB.
              if not os.path.exists('/tmp/input.mp4') or os.path.getsize('/tmp/input.mp4') < 10_000_000:
                  print(f'   Download too small ({os.path.getsize(\"/tmp/input.mp4\") if os.path.exists(\"/tmp/input.mp4\") else 0} bytes) — skipping'); continue
              with open('/tmp/input.mp4', 'rb') as f:
                  head = f.read(16)
              # mp4/mov files have 'ftyp' at offset 4
              if b'ftyp' not in head:
                  print(f'   Not a valid mp4 (first bytes: {head[:16].hex()}) — skipping')
                  continue

              print(f'   Downloaded: {os.path.getsize(\"/tmp/input.mp4\")/1024/1024:.0f} MB')

              env = os.environ.copy()
              if skip: env['SKIP_MORPH'] = 'true'
              print(f'   Morphing...')
              subprocess.run(['python3', 'scripts/morph_video.py', '/tmp/input.mp4', '/tmp/morphed.mp4'], env=env)

              if not os.path.exists('/tmp/morphed.mp4'):
                  print('   Morph failed'); os.remove('/tmp/input.mp4'); continue

              print('   Uploading to YouTube...')
              env['YOUTUBE_UPLOAD_TITLE'] = f'Archive Backup - {title}'
              up = subprocess.run(['python3', 'scripts/upload_to_youtube.py', '/tmp/morphed.mp4'], env=env, capture_output=True, text=True)

              yt_id = ''
              for line in (up.stdout or '').split('\n'):
                  if line.startswith('VIDEO_ID='): yt_id = line.split('=', 1)[1].strip()

              if yt_id:
                  # VERIFY the upload actually exists. YouTube sometimes accepts
                  # an upload + returns a VIDEO_ID, then silently rejects it
                  # minutes later (typical for: account not phone-verified,
                  # video too long for tier, content-id violation, etc).
                  # Without this check, we'd save a dead youtube_id and the
                  # dashboard's GHOST tile would 404 for every viewer.
                  import time as _t
                  ok = False
                  for attempt in range(6):  # up to ~60s
                      _t.sleep(10)
                      try:
                          r2 = subprocess.run(
                              ['curl', '-sS', '-o', '/dev/null', '-w', '%{http_code}',
                               f'https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v={yt_id}&format=json'],
                              capture_output=True, text=True, timeout=15,
                          )
                          if (r2.stdout or '').strip() == '200':
                              ok = True
                              break
                      except Exception:
                          pass
                  if not ok:
                      print(f'   ⚠️  Upload {yt_id} did not become reachable within 60s — discarding')
                      print('       (YouTube likely rejected the video after accepting it.')
                      print('        Will retry on next ghost-host run.)')
                      yt_id = ''

              if yt_id:
                  for r in recs:
                      if r.get('video_id') == vid:
                          r['youtube_id'] = yt_id
                          r['youtube_unlisted'] = f'https://youtu.be/{yt_id}'
                  with open('data/recordings.json', 'w') as f:
                      json.dump(recs, f, indent=2)
                  print(f'   Uploaded: https://youtu.be/{yt_id}')
              else:
                  print('   Upload failed')
                  if up.stdout: print(f'   {up.stdout[:300]}')
                  if up.stderr: print(f'   {up.stderr[:300]}')

              for f in ['/tmp/input.mp4', '/tmp/morphed.mp4']:
                  try: os.remove(f)
                  except: pass

          print('Done')
          "

      - name: Push
        run: |
          git config user.name  "Stream Recorder Bot"
          git config user.email "bot@stream-recorder"
          git add data/recordings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "👻 YouTube Ghost-Host: all recordings"
          # Retry-with-rebase: long ghost-host runs (30–60 min for 3-hour
          # videos) frequently race against sibling workflows / Dependabot
          # commits. Without this loop, the new youtube_id values were lost
          # and the workflow would re-upload the same video next time.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed successfully on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::error::Push failed after 5 attempts — youtube_id values from this run are NOT persisted in recordings.json"
          exit 1
