# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔴 MEGA Account Manager — Generate & Maintain MEGA.nz Accounts           ║
# ║  Uses github.com/f-o/MEGA-Account-Generator approach:                     ║
# ║    • Generates accounts with temporary Mail.tm emails                     ║
# ║    • Auto-verifies via email link                                         ║
# ║    • Signs into all accounts monthly to prevent deletion                  ║
# ║  Accounts are stored in accounts.csv (committed to repo).                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🔴 MEGA Account Manager"

on:
  # Manual trigger — for generating new accounts or force sign-in
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - generate     # Generate new accounts
          - signin       # Sign into all accounts (keep-alive)
          - both         # Generate + Sign in
      num_accounts:
        description: "Number of accounts to generate (only for generate/both)"
        required: false
        default: "10"
        type: string
      account_password:
        description: "Password for new accounts (leave empty for random)"
        required: false
        default: ""
        type: string

  # Scheduled: Sign in on the 1st and 15th of every month (keep-alive)
  schedule:
    - cron: "0 10 1 * *"     # 1st of month at 10:00 UTC
    - cron: "0 10 15 * *"    # 15th of month at 10:00 UTC

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  TZ: Asia/Karachi

jobs:
  mega-manager:
    name: "🔴 MEGA Account Manager"
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      # ─── 1. CHECKOUT ─────────────────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v7

      # ─── 2. INSTALL DEPENDENCIES ─────────────────────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          echo "📦 Installing megatools & Python dependencies..."
          sudo apt-get update -qq
          
          # Install megatools (try apt first, then manual download)
          if ! sudo apt-get install -y -qq megatools 2>/dev/null; then
            echo "⚠️ apt install failed — trying manual megatools install..."
            # Download megatools binary directly
            wget -q "https://megatools.megous.com/builds/builds/megatools-1.11.1.20230212-linux-x86_64.tar.gz" -O /tmp/megatools.tar.gz 2>/dev/null || \
            wget -q "https://xff.cz/megatools/builds/builds/megatools-1.11.1.20230212-linux-x86_64.tar.gz" -O /tmp/megatools.tar.gz 2>/dev/null
            
            if [[ -f /tmp/megatools.tar.gz ]]; then
              cd /tmp && tar xzf megatools.tar.gz
              sudo cp /tmp/megatools-*/megatools /usr/local/bin/ 2>/dev/null || \
              sudo cp /tmp/megatools-*/mega* /usr/local/bin/ 2>/dev/null || true
              cd $GITHUB_WORKSPACE
            fi
          fi
          
          # Install Python dependencies
          pip3 install --quiet -r scripts/mega/requirements.txt
          
          # Verify installations
          echo "──────────────────────────────────────"
          echo "megatools: $(megatools --version 2>&1 | head -1 || echo 'NOT FOUND')"
          which megatools || which megaput || echo "⚠️ megatools binary not in PATH"
          echo "python3: $(python3 --version)"
          pip3 list 2>/dev/null | grep -E "pymailtm|faker|requests" || true
          echo "──────────────────────────────────────"

      # ─── 3. GENERATE ACCOUNTS (if requested) ─────────────────────────────
      - name: "🔴 Generate MEGA Accounts"
        id: generate
        if: >-
          github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.action == 'generate' || github.event.inputs.action == 'both')
        run: |
          echo "═══════════════════════════════════════"
          echo "🔴 Generating MEGA Accounts"
          echo "═══════════════════════════════════════"
          
          NUM="${{ github.event.inputs.num_accounts }}"
          NUM="${NUM:-3}"
          PASS="${{ github.event.inputs.account_password }}"
          
          ARGS=(-n "$NUM")
          [[ -n "$PASS" ]] && ARGS+=( -p "$PASS" )
          
          echo "Generating $NUM accounts..."
          echo "Working directory: $(pwd)"
          echo "CSV location: scripts/mega/accounts.csv"
          
          # Run the generator with full output (no suppression)
          python3 scripts/mega/generate_accounts.py "${ARGS[@]}" 2>&1
          GEN_RC=$?
          
          if [[ $GEN_RC -eq 0 ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            TOTAL=$(tail -n +2 scripts/mega/accounts.csv 2>/dev/null | wc -l)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "✅ Generation complete — $TOTAL total accounts"
            echo ""
            echo "📋 accounts.csv contents (emails only):"
            tail -n +2 scripts/mega/accounts.csv 2>/dev/null | cut -d',' -f1 || true
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Generation failed with exit code: $GEN_RC"
            echo ""
            echo "Common causes:"
            echo "  - Mail.tm may be temporarily down"
            echo "  - megatools 'reg' command may be blocked"
            echo "  - Rate limited by Mail.tm (wait 5 min and retry)"
          fi

      # ─── 4. SIGN IN TO ALL ACCOUNTS (keep-alive) ─────────────────────────
      - name: "🔄 Sign In to All Accounts"
        id: signin
        if: >-
          github.event_name == 'schedule' || 
          github.event.inputs.action == 'signin' || 
          github.event.inputs.action == 'both'
        run: |
          echo "═══════════════════════════════════════"
          echo "🔄 MEGA Account Keep-Alive Sign-In"
          echo "═══════════════════════════════════════"
          
          # accounts.csv is intentionally tracked in this repository for this project.
          if [[ ! -f scripts/mega/accounts.csv ]]; then
            echo "⚠️ No accounts.csv found — skipping sign-in"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          TOTAL=$(tail -n +2 scripts/mega/accounts.csv 2>/dev/null | wc -l)
          echo "Found $TOTAL accounts to sign in..."
          
          if python3 scripts/mega/signin_accounts.py; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=partial" >> $GITHUB_OUTPUT
          fi
          
          # Read results
          if [[ -f scripts/mega/signin_results.json ]]; then
            SUCCESS=$(jq -r '.success' scripts/mega/signin_results.json)
            FAILED=$(jq -r '.failed' scripts/mega/signin_results.json)
            TOTAL_R=$(jq -r '.total' scripts/mega/signin_results.json)
            echo "success_count=$SUCCESS" >> $GITHUB_OUTPUT
            echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
            echo "total_count=$TOTAL_R" >> $GITHUB_OUTPUT
          fi

      # ─── 5. COMMIT UPDATED ACCOUNTS ──────────────────────────────────────
      - name: "💾 Commit Account Changes"
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          
          # Remove temp files
          rm -f scripts/mega/signin_results.json
          
          # Check if accounts.csv exists and has changes
          if [[ ! -f scripts/mega/accounts.csv ]]; then
            echo "📝 No accounts.csv found — nothing to commit"
            exit 0
          fi
          
          # Check for any changes (new file or modified)
          git add scripts/mega/accounts.csv 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "📝 No staged changes"
            exit 0
          fi
          
          git config user.name "Stream Recorder Bot"
          git config user.email "bot@stream-recorder.local"
          
          TIMESTAMP=$(TZ='Asia/Karachi' date '+%Y-%m-%d %H:%M PKT')
          git commit -m "🔴 MEGA accounts updated — ${TIMESTAMP}"
          
          # Push with PAT if available, otherwise try default token
          if [[ -n "${GH_PAT:-}" ]]; then
            git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          
          git push
          echo "✅ Account changes committed and pushed"

      # ─── 6. DISCORD NOTIFICATION ──────────────────────────────────────────
      - name: "📡 Send Discord Report"
        if: always()
        run: |
          WEBHOOK="${DISCORD_WEBHOOK_REPORTS:-$DISCORD_WEBHOOK_URL}"
          [[ -z "$WEBHOOK" ]] && exit 0

          GEN_STATUS="${{ steps.generate.outputs.status }}"
          GEN_TOTAL="${{ steps.generate.outputs.total }}"
          SIGNIN_STATUS="${{ steps.signin.outputs.status }}"
          SIGNIN_SUCCESS="${{ steps.signin.outputs.success_count }}"
          SIGNIN_FAILED="${{ steps.signin.outputs.failed_count }}"
          SIGNIN_TOTAL="${{ steps.signin.outputs.total_count }}"

          ACTION="${{ github.event.inputs.action }}"
          [[ -z "$ACTION" ]] && ACTION="signin (scheduled)"

          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          DATE_STR=$(TZ='Asia/Karachi' date '+%A, %B %d, %Y')
          TIME_STR=$(TZ='Asia/Karachi' date '+%I:%M %p PKT')

          # ─── Determine overall status ───
          OVERALL_ICON="✅"
          OVERALL_TEXT="All Systems Operational"
          COLOR=5763757  # green

          if [[ "$GEN_STATUS" == "failed" ]]; then
            OVERALL_ICON="❌"
            OVERALL_TEXT="Generation Failed"
            COLOR=15158332  # red
          elif [[ "$SIGNIN_STATUS" == "partial" ]]; then
            OVERALL_ICON="⚠️"
            OVERALL_TEXT="Some Accounts Need Attention"
            COLOR=16744448  # orange
          elif [[ "$SIGNIN_STATUS" == "skipped" ]] && [[ -z "$GEN_STATUS" ]]; then
            OVERALL_ICON="⚠️"
            OVERALL_TEXT="No Accounts Found"
            COLOR=16776960  # yellow
          fi

          # ─── Build fields array ───
          FIELDS="[]"

          # Action field
          FIELDS=$(echo "$FIELDS" | jq \
            --arg action "$ACTION" \
            '. + [{"name": "🎯 Action Performed", "value": ("```\n" + ($action | ascii_upcase) + "\n```"), "inline": true}]')

          # Date field
          FIELDS=$(echo "$FIELDS" | jq \
            --arg date "$DATE_STR" \
            '. + [{"name": "📅 Date", "value": $date, "inline": true}]')

          # Time field
          FIELDS=$(echo "$FIELDS" | jq \
            --arg time "$TIME_STR" \
            '. + [{"name": "🕐 Time", "value": $time, "inline": true}]')

          # Spacer
          FIELDS=$(echo "$FIELDS" | jq '. + [{"name": "\u200b", "value": "\u200b", "inline": false}]')

          # Generation results (if applicable)
          if [[ -n "$GEN_STATUS" ]]; then
            if [[ "$GEN_STATUS" == "success" ]]; then
              STORAGE_GB=$((GEN_TOTAL * 20))
              GEN_VALUE="✅ **Successfully Generated**\n\n"
              GEN_VALUE+="╔══════════════════════════╗\n"
              GEN_VALUE+="║  📊 **Total Accounts:** \`${GEN_TOTAL}\`\n"
              GEN_VALUE+="║  💾 **Total Storage:** \`${STORAGE_GB} GB\`\n"
              GEN_VALUE+="║  🔄 **Rotation:** Round-Robin\n"
              GEN_VALUE+="╚══════════════════════════╝"
            else
              GEN_VALUE="❌ **Generation Failed**\n\n"
              GEN_VALUE+="Check [workflow logs](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) for details.\n"
              GEN_VALUE+="Common causes:\n"
              GEN_VALUE+="• Mail.tm temporarily down\n"
              GEN_VALUE+="• MEGA rate limiting\n"
              GEN_VALUE+="• Try again in 5 minutes"
            fi
            FIELDS=$(echo "$FIELDS" | jq \
              --arg val "$GEN_VALUE" \
              '. + [{"name": "🔴 Account Generation", "value": $val, "inline": false}]')
          fi

          # Sign-in results (if applicable)
          if [[ -n "$SIGNIN_STATUS" ]]; then
            if [[ "$SIGNIN_STATUS" == "success" ]]; then
              STORAGE_GB=$((SIGNIN_TOTAL * 20))

              # Build progress bar
              PROGRESS="██████████"
              SIGNIN_VALUE="✅ **All Accounts Healthy**\n\n"
              SIGNIN_VALUE+="\`${PROGRESS}\` **${SIGNIN_SUCCESS}/${SIGNIN_TOTAL}** accounts alive\n\n"
              SIGNIN_VALUE+="╔══════════════════════════╗\n"
              SIGNIN_VALUE+="║  ✅ **Active:**  \`${SIGNIN_SUCCESS}\` accounts\n"
              SIGNIN_VALUE+="║  ❌ **Failed:**  \`0\` accounts\n"
              SIGNIN_VALUE+="║  💾 **Storage:** \`~${STORAGE_GB} GB\` available\n"
              SIGNIN_VALUE+="║  🛡️ **Status:**  All Protected\n"
              SIGNIN_VALUE+="╚══════════════════════════╝\n\n"
              SIGNIN_VALUE+="*Next keep-alive: ~15 days*"
            elif [[ "$SIGNIN_STATUS" == "partial" ]]; then
              ALIVE_PCT=0
              [[ "$SIGNIN_TOTAL" -gt 0 ]] && ALIVE_PCT=$((SIGNIN_SUCCESS * 100 / SIGNIN_TOTAL))
              BLOCKS=$((ALIVE_PCT / 10))
              EMPTY=$((10 - BLOCKS))
              PROGRESS=$(printf '█%.0s' $(seq 1 $BLOCKS 2>/dev/null) 2>/dev/null)$(printf '░%.0s' $(seq 1 $EMPTY 2>/dev/null) 2>/dev/null)
              [[ -z "$PROGRESS" ]] && PROGRESS="░░░░░░░░░░"

              SIGNIN_VALUE="⚠️ **Some Accounts Need Attention**\n\n"
              SIGNIN_VALUE+="\`${PROGRESS}\` **${SIGNIN_SUCCESS}/${SIGNIN_TOTAL}** (${ALIVE_PCT}%)\n\n"
              SIGNIN_VALUE+="╔══════════════════════════╗\n"
              SIGNIN_VALUE+="║  ✅ **Active:**  \`${SIGNIN_SUCCESS}\` accounts\n"
              SIGNIN_VALUE+="║  ❌ **Failed:**  \`${SIGNIN_FAILED}\` accounts\n"
              SIGNIN_VALUE+="║  ⚠️ **Action:**  Regenerate failed\n"
              SIGNIN_VALUE+="╚══════════════════════════╝\n\n"
              SIGNIN_VALUE+="*Run \`generate\` to create replacement accounts*"
            elif [[ "$SIGNIN_STATUS" == "skipped" ]]; then
              SIGNIN_VALUE="⏭️ **Skipped**\n\n"
              SIGNIN_VALUE+="No \`accounts.csv\` found.\n"
              SIGNIN_VALUE+="Run with action \`generate\` first."
            fi
            FIELDS=$(echo "$FIELDS" | jq \
              --arg val "$SIGNIN_VALUE" \
              '. + [{"name": "🔄 Keep-Alive Health Check", "value": $val, "inline": false}]')
          fi

          # System info footer field
          SYS_VALUE="☁️ Provider: **MEGA.nz** (20GB/account)\n"
          SYS_VALUE+="📧 Email: **Mail.tm** → Mail.gw → 1secmail\n"
          SYS_VALUE+="🔄 Upload: **Round-Robin** rotation\n"
          SYS_VALUE+="⏰ Keep-Alive: **1st & 15th** monthly"
          FIELDS=$(echo "$FIELDS" | jq \
            --arg val "$SYS_VALUE" \
            '. + [{"name": "⚙️ System Configuration", "value": $val, "inline": false}]')

          # ─── Build final payload ───
          PAYLOAD=$(jq -n \
            --arg username "${BOT_USERNAME:-☪️ The Muslim Lantern}" \
            --arg avatar "${AVATAR_URL:-}" \
            --arg overall_icon "$OVERALL_ICON" \
            --arg overall_text "$OVERALL_TEXT" \
            --arg timestamp "$TIMESTAMP" \
            --arg run_url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --argjson color "$COLOR" \
            --argjson fields "$FIELDS" \
            '{
              username: $username,
              avatar_url: $avatar,
              embeds: [{
                author: {
                  name: "MEGA Account Manager",
                  icon_url: "https://mega.nz/favicon.ico"
                },
                title: ($overall_icon + " " + $overall_text),
                url: $run_url,
                description: (
                  "> Automated MEGA.nz account management system.\n" +
                  "> Ensures cloud storage accounts remain active\n" +
                  "> and available for stream archival.\n\n" +
                  "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                ),
                color: $color,
                fields: $fields,
                footer: {
                  text: "☪️ MEGA Account Manager · Made with ❤️ by Muneeb Ahmad"
                },
                timestamp: $timestamp
              }]
            }')

          curl -s -o /dev/null -w "Discord: HTTP %{http_code}\n" \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK"

