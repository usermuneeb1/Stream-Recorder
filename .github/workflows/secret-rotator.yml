# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ 🔐 SECRET ROTATOR — Auto-Rotate Cloud Account Credentials                 ║
# ║                                                                            ║
# ║ Runs weekly (or on demand). Tests all cloud accounts and promotes          ║
# ║ the healthiest one to the active GitHub Secret.                            ║
# ║                                                                            ║
# ║ Required secrets:                                                          ║
# ║   GH_TOKEN — PAT with repo + secrets scope (GITHUB_TOKEN can't set secrets)║
# ║                                                                            ║
# ║ SAFE: Standalone workflow. Does NOT modify existing workflows.             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🔐 Secret Rotator

on:
  schedule:
    # Run every Monday at 3 AM UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to rotate"
        required: true
        type: choice
        options:
          - all
          - mega
          - pixeldrain

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install tools
        run: |
          # Install megatools for MEGA testing
          sudo apt-get update -qq
          sudo apt-get install -y -qq megatools
          # Install GitHub CLI (already available on ubuntu-latest)
          gh --version

      - name: 🔐 Rotate credentials
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
        run: |
          SERVICE="${{ github.event.inputs.service || 'all' }}"
          bash scripts/secret_rotator.sh "$SERVICE"
