# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📊 System Status — regenerate status JSON + README badges                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "📊 System Status"

on:
  push:
    branches: [main]
    paths:
      - "data/recordings.json"
      - "data/youtube-stats.json"
      - "stats.json"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: status
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  status:
    runs-on: ubuntu-24.04
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📊 Generate status + badges"
        run: python3 scripts/gen-status.py

      - name: "🧹 Purge jsDelivr CDN cache (keep gallery data fresh)"
        run: |
          for p in data/recordings.json data/youtube-stats.json data/system-status.json; do
            curl -s -o /dev/null "https://purge.jsdelivr.net/gh/usermuneeb1/Stream-Recorder@main/$p" || true
          done
          echo "Requested jsDelivr purge for data files."

      - name: "⬆️ Commit"
        run: |
          # RACE-SAFE commit+push. Previously this was a bare `git push`, which
          # failed intermittently with "! [rejected] main -> main (fetch first)"
          # whenever another workflow (recorder, dependabot, another status
          # trigger) landed a commit on main between our checkout and our push
          # (incident 2026-07-12 run 29176112058). Now: only commit if changed,
          # then rebase onto freshest main and retry so the status lands.
          if [[ -z "$(git status -s data/system-status.json data/badges)" ]]; then
            echo "No change."
            exit 0
          fi
          git config user.name "Stream Recorder Bot"
          git config user.email "bot@stream-recorder.local"
          git add data/system-status.json data/badges
          git commit -m "📊 Update system status + badges"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "✅ Status updated (attempt $attempt)."
              exit 0
            fi
            echo "⚠️ push attempt $attempt failed (remote moved) — rebasing + retrying in ${attempt}s"
            sleep "$attempt"
          done
          echo "❌ Could not push status after 5 attempts — will retry on next schedule."
          exit 1
