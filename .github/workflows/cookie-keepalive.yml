# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📡 STREAM RECORDER — COOKIE KEEP-ALIVE WORKFLOW                            ║
# ║  Runs every 2 days to keep YouTube cookies alive by making authenticated     ║
# ║  requests. Sends Discord alerts when cookies are about to expire.            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🍪 Cookie Keep-Alive"

on:
  schedule:
    # Every 2 days at 04:00 UTC (9:00 AM PKT)
    - cron: "0 4 */2 * *"
  
  workflow_dispatch:

concurrency:
  group: cookie-keepalive
  cancel-in-progress: false

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
  GH_PAT: ${{ secrets.GH_PAT }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  COOKIES_FILE: cookies.txt
  TZ: Asia/Karachi

jobs:
  keepalive:
    name: "🍪 Keep Cookies Alive"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq bc curl
          sed -i 's/\r$//' scripts/*.sh scripts/*.env 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: "🍪 Restore Cookies"
        run: |
          if [[ -n "${YOUTUBE_COOKIES:-}" ]]; then
            echo "$YOUTUBE_COOKIES" > "$COOKIES_FILE"
            echo "✅ Cookies restored ($(wc -l < "$COOKIES_FILE") lines)"
          else
            echo "⚠️ No YOUTUBE_COOKIES secret set"
            echo "COOKIE_STATUS=no_cookies" >> "$GITHUB_ENV"
          fi

      - name: "🔄 Run Keep-Alive"
        if: env.COOKIE_STATUS != 'no_cookies'
        run: bash scripts/cookie-keepalive.sh

      - name: "📋 Summary"
        if: always()
        run: |
          source scripts/utils.sh
          
          echo "## 🍪 Cookie Keep-Alive Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ Time | $(now_pkt) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍪 Status | ${COOKIE_STATUS_EMOJI:-❓} ${COOKIE_KEEPALIVE_STATUS:-unknown} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📡 Pings | ${COOKIE_KEEPALIVE_PINGS_OK:-0}/${COOKIE_KEEPALIVE_PINGS_TOTAL:-0} OK |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏳ Days Left | ${COOKIE_KEEPALIVE_DAYS_LEFT:-unknown} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Expires | ${COOKIE_KEEPALIVE_EXPIRY:-unknown} |" >> $GITHUB_STEP_SUMMARY
