name: "🧪 Test Pipeline & Features"

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: 'YouTube URL to test live recording (24/7 stream recommended)'
        required: true
        default: 'https://www.youtube.com/watch?v=bByGQJpEwRw'

concurrency:
  group: stream-recorder-test
  cancel-in-progress: false

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
  DISCORD_WEBHOOK_LINKS: ${{ secrets.DISCORD_WEBHOOK_LINKS }}
  DISCORD_WEBHOOK_RECORDINGS: ${{ secrets.DISCORD_WEBHOOK_RECORDINGS }}
  YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
  ARCHIVE_ACCESS_KEY: ${{ secrets.ARCHIVE_ACCESS_KEY }}
  ARCHIVE_SECRET_KEY: ${{ secrets.ARCHIVE_SECRET_KEY }}
  PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
  GOFILE_API_KEY: ${{ secrets.GOFILE_API_KEY }}
  WARP_LICENSE_KEY: ${{ secrets.WARP_LICENSE_KEY }}
  YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
  GH_PAT: ${{ secrets.GH_PAT }}
  RECORD_DIR: /tmp/stream-recorder
  TZ: Asia/Karachi

jobs:
  test-features:
    name: "🧪 Run True Feature Tests (10 Min)"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq curl bc python3
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp 2>/dev/null || \
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          pip3 install --quiet streamlink chat-downloader
          chmod +x scripts/*.sh

      - name: "🌐 Configure WARP Proxy"
        continue-on-error: true
        run: |
          source scripts/utils.sh
          if [[ -n "${WARP_LICENSE_KEY}" ]]; then
            curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
            sudo apt-get update && sudo apt-get install cloudflare-warp -y
            warp-cli --accept-tos registration new
            warp-cli --accept-tos mode proxy
            warp-cli --accept-tos connect
            sleep 5
            export WARP_CONNECTED=true
            echo "WARP_CONNECTED=true" >> $GITHUB_ENV
          fi

      - name: "🧪 1. Mock Detection"
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh
          # Set mock variables to the input URL
          export STREAM_TEST_MODE="true"
          export STREAM_URL="${{ github.event.inputs.test_url }}"
          export STREAM_CHANNEL="Test Channel"
          export STREAM_TITLE="LIVE PIPELINE TEST (10M)"
          export STREAM_VIDEO_ID=$(echo "$STREAM_URL" | grep -oP 'v=\K[^&]+' || echo "TEST1234")
          
          echo "STREAM_URL=${STREAM_URL}" >> $GITHUB_ENV
          echo "STREAM_CHANNEL=${STREAM_CHANNEL}" >> $GITHUB_ENV
          echo "STREAM_TITLE=${STREAM_TITLE}" >> $GITHUB_ENV
          echo "STREAM_VIDEO_ID=${STREAM_VIDEO_ID}" >> $GITHUB_ENV
          
          # Send alert using the actual Live notification script component
          notify_live_detected || true

      - name: "🧪 2. Realistic 10-Minute Recording"
        run: |
          export RECORD_DIR="/tmp/stream-recorder"
          mkdir -p "$RECORD_DIR"
          
          echo "Starting realistic 10-minute stream recording of ${STREAM_URL}..."
          # The timeout command sends SIGINT (Ctrl+C) to ytdlp exactly after 10m so it safely flushes the MP4 file
          timeout -s SIGINT 10m bash scripts/record-stream.sh || true
          
          echo "Recording phase complete."
          ls -la "$RECORD_DIR"

      - name: "🧪 3. Post-Process Component"
        run: |
          echo "Processing chunks into final MP4..."
          bash scripts/post-process.sh

      - name: "🧪 4. Cloud Upload Engine"
        run: |
          echo "Uploading..."
          bash scripts/upload-clouds.sh

      - name: "🧪 5. Notify & Archive"
        run: |
          echo "Executing update-stats, update-links and notify_recording_complete..."
          bash scripts/update-stats.sh
          bash scripts/update-links.sh
          
          source scripts/utils.sh
          source scripts/discord-notify.sh
          notify_recording_complete || true
