# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📺 YouTube Channel → Archive.org                                          ║
# ║  Downloads entire YouTube channels/playlists and archives them.            ║
# ║  Each playlist → separate Archive.org item (like a folder).               ║
# ║  Full metadata: channel name, video title, description, date.              ║
# ║  NOT anonymous — this is for public archival/preservation.                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "📺 YouTube → Archive.org"

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube channel URL or playlist URL"
        required: true
        type: string
      mode:
        description: "Mode"
        required: true
        type: choice
        options:
          - upload
          - list-only
      channel_name:
        description: "Channel name (for metadata)"
        required: false
        default: ""
        type: string
      quality:
        description: "Video quality"
        required: false
        type: choice
        default: "1080p"
        options:
          - best
          - 1080p
          - 720p
          - 480p
      max_videos:
        description: "Max videos per playlist (0 = all)"
        required: false
        default: "0"
        type: string
      skip_existing:
        description: "Skip videos already on Archive.org"
        required: false
        type: boolean
        default: true

env:
  ARCHIVE_ACCESS_KEY: ${{ secrets.ARCHIVE_ACCESS_KEY }}
  ARCHIVE_SECRET_KEY: ${{ secrets.ARCHIVE_SECRET_KEY }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  TZ: Asia/Karachi

jobs:
  archive:
    name: "📺 Archive YouTube"
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Install Tools"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq aria2 ffmpeg python3-pip
          pip3 install -q yt-dlp 2>/dev/null || pip install -q yt-dlp
          echo "✅ Tools: yt-dlp + ffmpeg + aria2 + jq"

      - name: "📺 Process YouTube Content"
        id: process
        run: |
          URL="${{ github.event.inputs.url }}"
          MODE="${{ github.event.inputs.mode }}"
          CHANNEL="${{ github.event.inputs.channel_name }}"
          QUALITY="${{ github.event.inputs.quality }}"
          MAX_VIDEOS="${{ github.event.inputs.max_videos }}"
          SKIP_EXISTING="${{ github.event.inputs.skip_existing }}"
          ACCESS="${ARCHIVE_ACCESS_KEY}"
          SECRET="${ARCHIVE_SECRET_KEY}"

          [[ "$MAX_VIDEOS" == "0" ]] && MAX_VIDEOS=""

          # Quality format
          case "$QUALITY" in
            "1080p") FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
            "720p")  FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            "480p")  FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
            *)       FORMAT="bestvideo+bestaudio/best" ;;
          esac

          echo "═══════════════════════════════════════"
          echo "📺 YouTube Channel → Archive.org"
          echo "  URL: $URL"
          echo "  Mode: $MODE"
          echo "  Quality: $QUALITY"
          echo "═══════════════════════════════════════"

          # ─── Step 1: Get channel/playlist info ───
          echo ""
          echo "🔍 Scanning YouTube content..."

          # Get flat playlist info (no download)
          yt-dlp --flat-playlist -J "$URL" 2>/dev/null > /tmp/yt_info.json || {
            echo "❌ Failed to fetch YouTube info"
            exit 1
          }

          # Check if it's a channel (has multiple playlists) or single playlist
          TYPE=$(python3 -c "
          import json
          with open('/tmp/yt_info.json') as f:
              data = json.load(f)
          t = data.get('_type', 'video')
          title = data.get('title', 'Unknown')
          uploader = data.get('uploader', data.get('channel', ''))
          entries = data.get('entries', [])
          print(f'{t}|{title}|{uploader}|{len(entries)}')
          ")

          IFS='|' read -r YT_TYPE YT_TITLE YT_UPLOADER ENTRY_COUNT <<< "$TYPE"

          # Use provided channel name or auto-detect
          [[ -z "$CHANNEL" ]] && CHANNEL="$YT_UPLOADER"
          [[ -z "$CHANNEL" ]] && CHANNEL="$YT_TITLE"

          # Create safe prefix for Archive.org identifiers
          SAFE_CHANNEL=$(echo "$CHANNEL" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-30)

          echo ""
          echo "📺 Channel: $CHANNEL"
          echo "📋 Type: $YT_TYPE"
          echo "📊 Videos/Playlists: $ENTRY_COUNT"
          echo "🏷️ Archive prefix: $SAFE_CHANNEL"
          echo ""

          # ─── Step 2: Extract video list with playlist info ───
          echo "📋 Building video list..."

          python3 << 'PYEOF' > /tmp/video_list.tsv
          import json, sys

          with open('/tmp/yt_info.json') as f:
              data = json.load(f)

          playlist_title = data.get('title', 'Uploads')
          entries = data.get('entries', [])

          for entry in entries:
              if not entry:
                  continue
              # Check if this entry is itself a playlist (channel page with playlists)
              if entry.get('_type') == 'playlist':
                  # This is a sub-playlist — we'll handle it as a group
                  vid_id = entry.get('id', '')
                  title = entry.get('title', 'Unknown Playlist')
                  url = entry.get('url', entry.get('webpage_url', ''))
                  print(f"PLAYLIST\t{vid_id}\t{title}\t{url}")
              else:
                  # This is a video entry
                  vid_id = entry.get('id', entry.get('url', ''))
                  title = entry.get('title', 'Unknown')
                  duration = entry.get('duration', 0)
                  print(f"VIDEO\t{vid_id}\t{title}\t{playlist_title}\t{duration}")
          PYEOF

          VIDEO_COUNT=$(grep -c "^VIDEO" /tmp/video_list.tsv 2>/dev/null || echo "0")
          PLAYLIST_COUNT=$(grep -c "^PLAYLIST" /tmp/video_list.tsv 2>/dev/null || echo "0")

          echo "📊 Found: $VIDEO_COUNT videos, $PLAYLIST_COUNT sub-playlists"

          # ─── LIST-ONLY MODE ───
          if [[ "$MODE" == "list-only" ]]; then
            echo ""
            echo "═══════════════════════════════════════"
            echo "📋 LIST MODE — No downloads"
            echo "═══════════════════════════════════════"

            if [[ "$PLAYLIST_COUNT" -gt 0 ]]; then
              echo ""
              echo "📂 Sub-Playlists:"
              grep "^PLAYLIST" /tmp/video_list.tsv | while IFS=$'\t' read -r _ pid ptitle purl; do
                echo "  📁 $ptitle ($purl)"
              done
            fi

            if [[ "$VIDEO_COUNT" -gt 0 ]]; then
              echo ""
              echo "🎬 Videos:"
              COUNT=0
              grep "^VIDEO" /tmp/video_list.tsv | while IFS=$'\t' read -r _ vid vtitle vplaylist vdur; do
                COUNT=$((COUNT + 1))
                DUR_MIN=$((vdur / 60))
                echo "  $COUNT. [$vplaylist] $vtitle (${DUR_MIN}min) [ID: $vid]"
              done
            fi

            echo ""
            echo "total=$VIDEO_COUNT" >> $GITHUB_OUTPUT
            echo "success=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ─── UPLOAD MODE ───
          echo ""
          echo "═══════════════════════════════════════"
          echo "🚀 UPLOAD MODE — Downloading & Archiving"
          echo "═══════════════════════════════════════"

          SUCCESS=0
          FAILED=0
          SKIPPED=0
          TOTAL=0

          # Process sub-playlists first (if channel URL)
          if [[ "$PLAYLIST_COUNT" -gt 0 ]]; then
            echo ""
            echo "📂 Processing $PLAYLIST_COUNT playlists..."

            grep "^PLAYLIST" /tmp/video_list.tsv | while IFS=$'\t' read -r _ pid ptitle purl; do
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📁 Playlist: $ptitle"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Get videos in this playlist
              PLAYLIST_ARGS=""
              [[ -n "$MAX_VIDEOS" ]] && PLAYLIST_ARGS="--playlist-end $MAX_VIDEOS"

              yt-dlp --flat-playlist -J $PLAYLIST_ARGS "$purl" 2>/dev/null > /tmp/sub_playlist.json || continue

              python3 << 'SUBEOF' > /tmp/sub_videos.tsv
          import json
          with open('/tmp/sub_playlist.json') as f:
              data = json.load(f)
          pl_title = data.get('title', 'Unknown')
          for e in data.get('entries', []):
              if e and e.get('id'):
                  print(f"{e['id']}\t{e.get('title','Unknown')}\t{pl_title}\t{e.get('duration',0)}")
          SUBEOF

              SUB_COUNT=$(wc -l < /tmp/sub_videos.tsv)
              echo "  📊 $SUB_COUNT videos in playlist"

              # Safe playlist name for Archive.org
              SAFE_PLAYLIST=$(echo "$ptitle" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
              ARCHIVE_ID="${SAFE_CHANNEL}-${SAFE_PLAYLIST}"

              VCOUNT=0
              while IFS=$'\t' read -r vid vtitle vplaylist vdur; do
                [[ -z "$vid" ]] && continue
                VCOUNT=$((VCOUNT + 1))
                TOTAL=$((TOTAL + 1))

                echo ""
                echo "  ──────────────────────────────"
                echo "  🎬 [$VCOUNT/$SUB_COUNT] $vtitle"

                # Check if already archived
                if [[ "$SKIP_EXISTING" == "true" ]]; then
                  CHECK_ID="${ARCHIVE_ID}-${vid}"
                  EXISTS=$(curl -s -o /dev/null -w '%{http_code}' "https://archive.org/metadata/$CHECK_ID" 2>/dev/null)
                  if [[ "$EXISTS" == "200" ]]; then
                    echo "  ⏭️ Already archived — skipping"
                    SKIPPED=$((SKIPPED + 1))
                    continue
                  fi
                fi

                # Download video
                mkdir -p /tmp/transfer
                rm -f /tmp/transfer/*

                if yt-dlp \
                  -f "$FORMAT" \
                  --merge-output-format mp4 \
                  -o "/tmp/transfer/%(title).80s.%(ext)s" \
                  --retries 3 \
                  --socket-timeout 30 \
                  "https://www.youtube.com/watch?v=${vid}" 2>&1; then

                  FILE=$(find /tmp/transfer -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" | head -1)

                  if [[ -z "$FILE" ]]; then
                    echo "  ❌ No file after download"
                    FAILED=$((FAILED + 1))
                    continue
                  fi

                  FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
                  SIZE_MB=$((FILESIZE / 1024 / 1024))
                  SAFE_FILENAME=$(basename "$FILE" | sed 's/[^a-zA-Z0-9._-]/-/g')
                  ITEM_ID="${ARCHIVE_ID}-${vid}"
                  DATE_STR=$(date '+%Y-%m-%d')

                  echo "  ⬆️ Uploading to Archive.org ($SIZE_MB MB)..."
                  echo "     Item: $ITEM_ID"

                  HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
                    --max-time 7200 \
                    -H "authorization: LOW ${ACCESS}:${SECRET}" \
                    -H "x-archive-auto-make-bucket: 1" \
                    -H "x-archive-meta-title: ${vtitle}" \
                    -H "x-archive-meta-creator: ${CHANNEL}" \
                    -H "x-archive-meta-date: ${DATE_STR}" \
                    -H "x-archive-meta-description: ${vtitle} by ${CHANNEL}. Playlist: ${vplaylist}." \
                    -H "x-archive-meta-mediatype: movies" \
                    -H "x-archive-meta-collection: opensource_movies" \
                    -H "x-archive-meta-subject: youtube;${CHANNEL// /+};${SAFE_PLAYLIST};archive" \
                    -H "x-archive-meta-language: eng" \
                    -H "Content-Type: video/mp4" \
                    --upload-file "$FILE" \
                    "https://s3.us.archive.org/${ITEM_ID}/${SAFE_FILENAME}")

                  if [[ "$HTTP_CODE" =~ ^2 ]]; then
                    echo "  ✅ Archived: https://archive.org/details/${ITEM_ID}"
                    SUCCESS=$((SUCCESS + 1))
                  else
                    echo "  ❌ Archive.org HTTP $HTTP_CODE"
                    FAILED=$((FAILED + 1))
                  fi
                else
                  echo "  ❌ Download failed"
                  FAILED=$((FAILED + 1))
                fi

                # Cleanup
                rm -rf /tmp/transfer/*
                sleep 2

              done < /tmp/sub_videos.tsv

            done
          fi

          # Process direct videos (if playlist URL, not channel)
          if [[ "$VIDEO_COUNT" -gt 0 ]] && [[ "$PLAYLIST_COUNT" -eq 0 ]]; then
            echo ""
            echo "🎬 Processing $VIDEO_COUNT videos..."

            SAFE_PLAYLIST=$(echo "$YT_TITLE" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
            ARCHIVE_ID="${SAFE_CHANNEL}-${SAFE_PLAYLIST}"

            VCOUNT=0
            LIMIT_COUNT=0
            grep "^VIDEO" /tmp/video_list.tsv | while IFS=$'\t' read -r _ vid vtitle vplaylist vdur; do
              [[ -z "$vid" ]] && continue
              VCOUNT=$((VCOUNT + 1))
              TOTAL=$((TOTAL + 1))

              # Apply max_videos limit
              if [[ -n "$MAX_VIDEOS" ]] && [[ "$VCOUNT" -gt "$MAX_VIDEOS" ]]; then
                break
              fi

              echo ""
              echo "  ──────────────────────────────"
              echo "  🎬 [$VCOUNT/$VIDEO_COUNT] $vtitle"

              # Check if already archived
              if [[ "$SKIP_EXISTING" == "true" ]]; then
                CHECK_ID="${ARCHIVE_ID}-${vid}"
                EXISTS=$(curl -s -o /dev/null -w '%{http_code}' "https://archive.org/metadata/$CHECK_ID" 2>/dev/null)
                if [[ "$EXISTS" == "200" ]]; then
                  echo "  ⏭️ Already archived — skipping"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi
              fi

              # Download
              mkdir -p /tmp/transfer
              rm -f /tmp/transfer/*

              if yt-dlp \
                -f "$FORMAT" \
                --merge-output-format mp4 \
                -o "/tmp/transfer/%(title).80s.%(ext)s" \
                --retries 3 \
                --socket-timeout 30 \
                "https://www.youtube.com/watch?v=${vid}" 2>&1; then

                FILE=$(find /tmp/transfer -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" | head -1)

                if [[ -z "$FILE" ]]; then
                  echo "  ❌ No file after download"
                  FAILED=$((FAILED + 1))
                  continue
                fi

                FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
                SIZE_MB=$((FILESIZE / 1024 / 1024))
                SAFE_FILENAME=$(basename "$FILE" | sed 's/[^a-zA-Z0-9._-]/-/g')
                ITEM_ID="${ARCHIVE_ID}-${vid}"
                DATE_STR=$(date '+%Y-%m-%d')

                echo "  ⬆️ Uploading to Archive.org ($SIZE_MB MB)..."

                HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
                  --max-time 7200 \
                  -H "authorization: LOW ${ACCESS}:${SECRET}" \
                  -H "x-archive-auto-make-bucket: 1" \
                  -H "x-archive-meta-title: ${vtitle}" \
                  -H "x-archive-meta-creator: ${CHANNEL}" \
                  -H "x-archive-meta-date: ${DATE_STR}" \
                  -H "x-archive-meta-description: ${vtitle} by ${CHANNEL}. Playlist: ${vplaylist}." \
                  -H "x-archive-meta-mediatype: movies" \
                  -H "x-archive-meta-collection: opensource_movies" \
                  -H "x-archive-meta-subject: youtube;${CHANNEL// /+};${SAFE_PLAYLIST};archive" \
                  -H "x-archive-meta-language: eng" \
                  -H "Content-Type: video/mp4" \
                  --upload-file "$FILE" \
                  "https://s3.us.archive.org/${ITEM_ID}/${SAFE_FILENAME}")

                if [[ "$HTTP_CODE" =~ ^2 ]]; then
                  echo "  ✅ Archived: https://archive.org/details/${ITEM_ID}"
                  SUCCESS=$((SUCCESS + 1))
                else
                  echo "  ❌ Archive.org HTTP $HTTP_CODE"
                  FAILED=$((FAILED + 1))
                fi
              else
                echo "  ❌ Download failed"
                FAILED=$((FAILED + 1))
              fi

              rm -rf /tmp/transfer/*
              sleep 2

            done
          fi

          echo ""
          echo "═══════════════════════════════════════"
          echo "📺 Archival Complete"
          echo "  ✅ Uploaded: $SUCCESS"
          echo "  ❌ Failed:   $FAILED"
          echo "  ⏭️ Skipped:  $SKIPPED"
          echo "  📊 Total:    $TOTAL"
          echo "═══════════════════════════════════════"

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: "📡 Send Discord Report"
        if: always()
        run: |
          WEBHOOK="${DISCORD_WEBHOOK_REPORTS:-$DISCORD_WEBHOOK_URL}"
          [[ -z "$WEBHOOK" ]] && exit 0

          CHANNEL="${{ steps.process.outputs.channel }}"
          TOTAL="${{ steps.process.outputs.total }}"
          SUCCESS="${{ steps.process.outputs.success }}"
          FAILED="${{ steps.process.outputs.failed }}"
          SKIPPED="${{ steps.process.outputs.skipped }}"
          MODE="${{ github.event.inputs.mode }}"
          URL="${{ github.event.inputs.url }}"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          COLOR=5763757
          [[ "$FAILED" -gt 0 ]] 2>/dev/null && COLOR=16744448

          FIELDS="[]"
          FIELDS=$(echo "$FIELDS" | jq --arg v "${CHANNEL:-Unknown}" '. + [{"name":"📺 Channel","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "$MODE" '. + [{"name":"⚙️ Mode","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${{ github.event.inputs.quality }}" '. + [{"name":"🎥 Quality","value":$v,"inline":true}]')

          FIELDS=$(echo "$FIELDS" | jq '. + [{"name":"\u200b","value":"\u200b","inline":false}]')

          FIELDS=$(echo "$FIELDS" | jq --arg v "${SUCCESS:-0}" '. + [{"name":"✅ Uploaded","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${FAILED:-0}" '. + [{"name":"❌ Failed","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${SKIPPED:-0}" '. + [{"name":"⏭️ Skipped","value":$v,"inline":true}]')

          SHORT_URL=$(echo "$URL" | head -c 60)
          FIELDS=$(echo "$FIELDS" | jq --arg v "$SHORT_URL" '. + [{"name":"🔗 Source","value":("`" + $v + "`"),"inline":false}]')

          PAYLOAD=$(jq -n \
            --arg username "${BOT_USERNAME:-☪️ The Muslim Lantern}" \
            --arg avatar "${AVATAR_URL:-}" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            --argjson fields "$FIELDS" \
            '{
              username: $username,
              avatar_url: $avatar,
              embeds: [{
                title: "📺 YouTube → Archive.org Complete",
                description: "> YouTube channel/playlist archived to Archive.org\n> with full metadata, organized by playlist.",
                color: $color,
                fields: $fields,
                footer: { text: "📺 YouTube Channel Archiver" },
                timestamp: $timestamp
              }]
            }')

          curl -s -o /dev/null -w "Discord: HTTP %{http_code}\n" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$WEBHOOK"
