# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📺 YouTube Channel → Archive.org                                          ║
# ║  Downloads entire YouTube channels/playlists and archives them.            ║
# ║  Each playlist → separate Archive.org group. Full metadata.               ║
# ║  Downloads ONE video at a time → upload → delete → next (saves disk).     ║
# ║  Resumable: re-run and it skips already-archived videos.                   ║
# ║  Requires YOUTUBE_COOKIES secret for bot bypass.                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "📺 YouTube → Archive.org"

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube channel URL or playlist URL"
        required: true
        type: string
      mode:
        description: "Mode"
        required: true
        type: choice
        options:
          - upload
          - list-only
      channel_name:
        description: "Channel name (for metadata)"
        required: false
        default: ""
        type: string
      quality:
        description: "Video quality"
        required: false
        type: choice
        default: "1080p"
        options:
          - best
          - 1080p
          - 720p
          - 480p
      max_videos:
        description: "Max videos per playlist (0 = all)"
        required: false
        default: "0"
        type: string
      skip_existing:
        description: "Skip videos already on Archive.org"
        required: false
        type: boolean
        default: true
      start_from:
        description: "Start from video # (skip first N-1 videos, for resuming)"
        required: false
        default: "1"
        type: string
      proxy:
        description: "HTTP/SOCKS5 proxy URL (optional, overrides YOUTUBE_PROXY secret)"
        required: false
        default: ""
        type: string

env:
  ARCHIVE_ACCESS_KEY: ${{ secrets.ARCHIVE_ACCESS_KEY }}
  ARCHIVE_SECRET_KEY: ${{ secrets.ARCHIVE_SECRET_KEY }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
  YOUTUBE_PROXY: ${{ secrets.YOUTUBE_PROXY }}
  TZ: Asia/Karachi

jobs:
  archive:
    name: "📺 Archive YouTube"
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Install Tools"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq aria2 ffmpeg python3-pip

          # Install deno (JS runtime required by yt-dlp)
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          export PATH="$HOME/.deno/bin:$PATH"

          # Install yt-dlp NIGHTLY (has latest YouTube anti-bot fixes)
          pip3 install -q --upgrade "yt-dlp[default]" 2>/dev/null || pip install -q --upgrade yt-dlp
          # Try to get absolute latest nightly build
          pip3 install -q --upgrade --pre yt-dlp 2>/dev/null || true

          # Install OAuth2 plugin (more reliable than cookies in CI/CD)
          pip3 install -q yt-dlp-youtube-oauth2 2>/dev/null || true

          echo "✅ Tools installed"
          yt-dlp --version

      - name: "🌐 Setup Cloudflare WARP (bypass datacenter IP block)"
        uses: sebst/actions-warp@v1
        continue-on-error: true
        with:
          tos: YES

      - name: "🌐 Verify WARP Connection"
        continue-on-error: true
        run: |
          echo "🌐 Checking WARP connection..."
          TRACE=$(curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "")
          if echo "$TRACE" | grep -q "warp=on"; then
            echo "✅ WARP is ON — traffic routed through Cloudflare"
          else
            echo "⚠️ WARP not detected — may still use datacenter IP"
          fi
          IP=$(curl -s --max-time 10 https://ifconfig.me 2>/dev/null || echo 'unknown')
          echo "🌐 Current IP: $IP"

      - name: "🍪 Setup YouTube Cookies"
        run: |
          if [[ -n "$YOUTUBE_COOKIES" ]]; then
            echo "$YOUTUBE_COOKIES" > /tmp/cookies.txt
            echo "✅ YouTube cookies loaded ($(wc -l < /tmp/cookies.txt) lines)"
          else
            echo "⚠️ No YOUTUBE_COOKIES secret — YouTube may block downloads"
            echo "   To fix: export cookies from browser → add as YOUTUBE_COOKIES secret"
            touch /tmp/cookies.txt
          fi

      - name: "📺 Process YouTube Content"
        id: process
        run: |
          export PATH="$HOME/.deno/bin:$PATH"

          URL="${{ github.event.inputs.url }}"
          MODE="${{ github.event.inputs.mode }}"
          CHANNEL="${{ github.event.inputs.channel_name }}"
          QUALITY="${{ github.event.inputs.quality }}"
          MAX_VIDEOS="${{ github.event.inputs.max_videos }}"
          SKIP_EXISTING="${{ github.event.inputs.skip_existing }}"
          START_FROM="${{ github.event.inputs.start_from }}"
          ACCESS="${ARCHIVE_ACCESS_KEY}"
          SECRET="${ARCHIVE_SECRET_KEY}"

          [[ "$MAX_VIDEOS" == "0" ]] && MAX_VIDEOS=""
          [[ -z "$START_FROM" ]] && START_FROM=1

          # Cookie args + anti-bot args
          COOKIE_ARGS=""
          if [[ -s /tmp/cookies.txt ]]; then
            COOKIE_ARGS="--cookies /tmp/cookies.txt"
          fi

          # Proxy support: workflow input overrides secret
          PROXY="${{ github.event.inputs.proxy }}"
          [[ -z "$PROXY" ]] && PROXY="${YOUTUBE_PROXY:-}"
          PROXY_ARGS=""
          if [[ -n "$PROXY" ]]; then
            PROXY_ARGS="--proxy $PROXY"
            echo "  🔀 Proxy: $PROXY"
          fi

          # Anti-bot: sleep between requests + use web_creator client
          YTDLP_ARGS="$COOKIE_ARGS $PROXY_ARGS --sleep-requests 3 --min-sleep-interval 5 --max-sleep-interval 20 --extractor-args youtube:player_client=web_creator"

          # Quality format — enforce minimum 720p
          case "$QUALITY" in
            "1080p") FORMAT="bestvideo[height<=1080][height>=720]+bestaudio/bestvideo[height<=1080]+bestaudio/best[height>=720]" ;;
            "720p")  FORMAT="bestvideo[height<=720][height>=720]+bestaudio/bestvideo[height<=720]+bestaudio/best[height>=720]" ;;
            "480p")  FORMAT="bestvideo[height<=480][height>=480]+bestaudio/bestvideo[height<=480]+bestaudio/best[height>=480]" ;;
            *)       FORMAT="bestvideo+bestaudio/best" ;;
          esac

          echo "═══════════════════════════════════════"
          echo "📺 YouTube Channel → Archive.org"
          echo "  URL: $URL"
          echo "  Mode: $MODE"
          echo "  Quality: $QUALITY"
          echo "  Start from: #$START_FROM"
          echo "  Cookies: $(if [[ -s /tmp/cookies.txt ]]; then echo '✅ loaded'; else echo '❌ none'; fi)"
          echo "═══════════════════════════════════════"

          # ─── Step 1: Get channel/playlist info ───
          echo ""
          echo "🔍 Scanning YouTube content..."

          yt-dlp --flat-playlist -J $YTDLP_ARGS "$URL" 2>/dev/null > /tmp/yt_info.json || {
            echo "❌ Failed to fetch YouTube info"
            exit 1
          }

          TYPE=$(python3 -c "
          import json
          with open('/tmp/yt_info.json') as f:
              data = json.load(f)
          t = data.get('_type', 'video')
          title = data.get('title', 'Unknown')
          uploader = data.get('uploader', data.get('channel', ''))
          entries = data.get('entries', [])
          print(f'{t}|{title}|{uploader}|{len(entries)}')
          ")

          IFS='|' read -r YT_TYPE YT_TITLE YT_UPLOADER ENTRY_COUNT <<< "$TYPE"

          [[ -z "$CHANNEL" ]] && CHANNEL="$YT_UPLOADER"
          [[ -z "$CHANNEL" ]] && CHANNEL="$YT_TITLE"
          archive_prefix="${CHANNEL}-${YT_TITLE}"
          archive_prefix=$(echo "$archive_prefix" | sed 's/[^a-zA-Z0-9_-]/-/g')
          # Append -HD to create a completely fresh Archive.org folder for the re-downloads
          archive_prefix=$(echo "${archive_prefix}-HD" | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-30)

          echo ""
          echo "📺 Channel: $CHANNEL"
          echo "📋 Type: $YT_TYPE"
          echo "📊 Entries: $ENTRY_COUNT"
          echo "🏷️ Archive prefix: $SAFE_CHANNEL"

          # ─── Step 2: Extract video list ───
          python3 << 'PYEOF' > /tmp/video_list.tsv
          import json
          with open('/tmp/yt_info.json') as f:
              data = json.load(f)
          playlist_title = data.get('title', 'Uploads')
          for entry in data.get('entries', []):
              if not entry:
                  continue
              if entry.get('_type') == 'playlist':
                  vid_id = entry.get('id', '')
                  title = entry.get('title', 'Unknown Playlist')
                  url = entry.get('url', entry.get('webpage_url', ''))
                  print(f"PLAYLIST\t{vid_id}\t{title}\t{url}")
              else:
                  vid_id = entry.get('id', entry.get('url', ''))
                  title = entry.get('title', 'Unknown')
                  duration = entry.get('duration', 0) or 0
                  print(f"VIDEO\t{vid_id}\t{title}\t{playlist_title}\t{duration}")
          PYEOF

          VIDEO_COUNT=$(grep -c "^VIDEO" /tmp/video_list.tsv 2>/dev/null || true)
          [[ -z "$VIDEO_COUNT" ]] && VIDEO_COUNT=0
          PLAYLIST_COUNT=$(grep -c "^PLAYLIST" /tmp/video_list.tsv 2>/dev/null || true)
          [[ -z "$PLAYLIST_COUNT" ]] && PLAYLIST_COUNT=0

          echo "📊 Found: $VIDEO_COUNT videos, $PLAYLIST_COUNT sub-playlists"

          # ─── LIST-ONLY MODE ───
          if [[ "$MODE" == "list-only" ]]; then
            echo ""
            echo "═══════════════════════════════════════"
            echo "📋 LIST MODE — No downloads"
            echo "═══════════════════════════════════════"

            if [[ "$PLAYLIST_COUNT" -gt 0 ]]; then
              echo "📂 Sub-Playlists:"
              grep "^PLAYLIST" /tmp/video_list.tsv | while IFS=$'\t' read -r _ pid ptitle purl; do
                echo "  📁 $ptitle"
              done
            fi

            if [[ "$VIDEO_COUNT" -gt 0 ]]; then
              echo "🎬 Videos:"
              C=0
              grep "^VIDEO" /tmp/video_list.tsv | while IFS=$'\t' read -r _ vid vtitle vpl vdur; do
                C=$((C + 1))
                echo "  $C. $vtitle [ID: $vid]"
              done
            fi

            echo "total=$((VIDEO_COUNT + PLAYLIST_COUNT))" >> $GITHUB_OUTPUT
            echo "success=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ─── UPLOAD MODE ───
          echo ""
          echo "═══════════════════════════════════════"
          echo "🚀 UPLOAD MODE — Download → Upload → Delete → Next"
          echo "  💾 Disk: ONE video at a time (max ~2GB used)"
          echo "═══════════════════════════════════════"

          SUCCESS=0
          FAILED=0
          SKIPPED=0
          TOTAL=0
          CONSECUTIVE_FAILS=0
          ABORT=false
          MAX_CONSECUTIVE_FAILS=5

          # Player clients to try (fallback order)
          # tv and android_vr can serve HD without PO Token; web_creator needs PO Token for HD
          PLAYER_CLIENTS=("tv" "android_vr" "web_creator" "mweb" "default")

          # ─── Function: download & upload one video ───
          process_video() {
            local vid="$1" vtitle="$2" vplaylist="$3" archive_prefix="$4"

            # Check abort flag
            if [[ "$ABORT" == "true" ]]; then
              return
            fi

            TOTAL=$((TOTAL + 1))

            # Skip if before start_from
            if [[ "$TOTAL" -lt "$START_FROM" ]]; then
              echo "  ⏭️ Skipping (before start_from=$START_FROM)"
              SKIPPED=$((SKIPPED + 1))
              return
            fi

            # Group all videos from this playlist into a single Archive.org "folder" (item)
            ITEM_ID="${archive_prefix}"

            # Check if this specific video is already inside the Archive.org item
            if [[ "$SKIP_EXISTING" == "true" ]]; then
              HAS_VIDEO=$(curl -s --max-time 15 "https://archive.org/metadata/$ITEM_ID" 2>/dev/null | python3 -c "import sys, json; print('yes' if any('${vid}' in f.get('name','') for f in json.load(sys.stdin).get('files',[])) else 'no')" 2>/dev/null || echo "no")
              if [[ "$HAS_VIDEO" == "yes" ]]; then
                echo "  ⏭️ Already in Archive.org item ${ITEM_ID} — skipping"
                SKIPPED=$((SKIPPED + 1))
                return
              else
                echo "  🔄 Video not in Archive.org item ${ITEM_ID} yet — will upload"
              fi
            fi

            # Download (one video, then delete after upload)
            mkdir -p /tmp/transfer
            rm -rf /tmp/transfer/*

            # Try multiple player clients as fallback
            local download_ok=false
            for client in "${PLAYER_CLIENTS[@]}"; do
              echo "  ⬇️ Downloading (client: $client)..."
              if yt-dlp \
                -f "$FORMAT" \
                --merge-output-format mp4 \
                -o "/tmp/transfer/%(title).80s [%(id)s].%(ext)s" \
                --retries 3 \
                --socket-timeout 30 \
                --no-playlist \
                --sleep-requests 3 \
                --min-sleep-interval 5 \
                --max-sleep-interval 20 \
                --extractor-args "youtube:player_client=$client" \
                $COOKIE_ARGS $PROXY_ARGS \
                "https://www.youtube.com/watch?v=${vid}" 2>&1; then
                download_ok=true
                break
              else
                echo "  ⚠️ Client '$client' failed, trying next..."
                rm -rf /tmp/transfer/*
                sleep 3
              fi
            done

            if [[ "$download_ok" == "true" ]]; then
              FILE=$(find /tmp/transfer -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" \) | head -1)

              if [[ -z "$FILE" ]]; then
                echo "  ❌ No file after download"
                FAILED=$((FAILED + 1))
                CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
                rm -rf /tmp/transfer/*
              else
                FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
                SIZE_MB=$((FILESIZE / 1024 / 1024))
                SAFE_FILENAME=$(basename "$FILE" | sed 's/[^a-zA-Z0-9._-]/-/g')
                DATE_STR=$(date '+%Y-%m-%d')

                echo "  ⬆️ Uploading to Archive.org ($SIZE_MB MB)..."

                HTTP_CODE=$(curl -g -s -o /dev/null -w '%{http_code}' \
                  --max-time 7200 \
                  -H "authorization: LOW ${ACCESS}:${SECRET}" \
                  -H "x-archive-auto-make-bucket: 1" \
                  -H "x-archive-meta-title: ${vtitle}" \
                  -H "x-archive-meta-creator: ${CHANNEL}" \
                  -H "x-archive-meta-date: ${DATE_STR}" \
                  -H "x-archive-meta-description: ${vtitle} by ${CHANNEL}. Playlist: ${vplaylist}." \
                  -H "x-archive-meta-mediatype: movies" \
                  -H "x-archive-meta-collection: opensource_movies" \
                  -H "x-archive-meta-subject: youtube;${CHANNEL// /+};${vplaylist// /+};archive" \
                  -H "x-archive-meta-language: eng" \
                  -H "Content-Type: video/mp4" \
                  --upload-file "$FILE" \
                  "https://s3.us.archive.org/${ITEM_ID}/${SAFE_FILENAME}" || true)

                if [[ "$HTTP_CODE" =~ ^2 ]]; then
                  echo "  ✅ Archived: https://archive.org/details/${ITEM_ID}"
                  SUCCESS=$((SUCCESS + 1))
                  CONSECUTIVE_FAILS=0  # Reset on success
                else
                  echo "  ❌ Archive.org HTTP $HTTP_CODE"
                  FAILED=$((FAILED + 1))
                  CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
                fi
              fi
            else
              echo "  ❌ All player clients failed for this video"
              FAILED=$((FAILED + 1))
              CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
            fi

            # ─── EARLY ABORT: stop if too many consecutive failures ───
            if [[ "$CONSECUTIVE_FAILS" -ge "$MAX_CONSECUTIVE_FAILS" ]]; then
              echo ""
              echo "🛑 ABORTING: $MAX_CONSECUTIVE_FAILS consecutive failures!"
              echo "   YouTube is blocking all downloads."
              echo "   Possible fixes:"
              echo "   1. Re-export fresh cookies from browser → update YOUTUBE_COOKIES secret"
              echo "   2. Set a YOUTUBE_PROXY secret (socks5://user:pass@host:port)"
              echo "   3. Wait a few hours and try again"
              echo "   4. Resume later with start_from=$((TOTAL + 1))"
              echo ""
              ABORT=true
              return
            fi

            # CRITICAL: Delete video to save disk space
            rm -rf /tmp/transfer/*
            echo "  🗑️ Cleaned up disk"

            # Show remaining disk
            DISK_FREE=$(df -h /tmp | tail -1 | awk '{print $4}')
            echo "  💾 Disk free: $DISK_FREE"

            sleep 2
          }

          # ─── Process sub-playlists (channel URL) ───
          if [[ "$PLAYLIST_COUNT" -gt 0 ]]; then
            echo ""
            echo "📂 Processing $PLAYLIST_COUNT playlists..."

            grep "^PLAYLIST" /tmp/video_list.tsv | while IFS=$'\t' read -r _ pid ptitle purl; do
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📁 Playlist: $ptitle"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              PLAYLIST_ARGS=""
              [[ -n "$MAX_VIDEOS" ]] && PLAYLIST_ARGS="--playlist-end $MAX_VIDEOS"

              yt-dlp --flat-playlist -J $PLAYLIST_ARGS $YTDLP_ARGS "$purl" 2>/dev/null > /tmp/sub_playlist.json || {
                echo "  ⚠️ Could not fetch playlist — skipping"
                continue
              }

              python3 << 'SUBEOF' > /tmp/sub_videos.tsv
          import json
          with open('/tmp/sub_playlist.json') as f:
              data = json.load(f)
          pl_title = data.get('title', 'Unknown')
          for e in data.get('entries', []):
              if e and e.get('id'):
                  dur = e.get('duration', 0) or 0
                  print(f"{e['id']}\t{e.get('title','Unknown')}\t{pl_title}\t{dur}")
          SUBEOF

              SUB_COUNT=$(wc -l < /tmp/sub_videos.tsv)
              echo "  📊 $SUB_COUNT videos in playlist"

              SAFE_PLAYLIST=$(echo "$ptitle" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
              ARCHIVE_PREFIX="${SAFE_CHANNEL}-${SAFE_PLAYLIST}"

              VCOUNT=0
              while IFS=$'\t' read -r vid vtitle vplaylist vdur; do
                [[ -z "$vid" ]] && continue
                [[ "$ABORT" == "true" ]] && break
                VCOUNT=$((VCOUNT + 1))

                echo ""
                echo "  ──────────────────────────────"
                echo "  🎬 [$VCOUNT/$SUB_COUNT] $vtitle"

                process_video "$vid" "$vtitle" "$vplaylist" "$ARCHIVE_PREFIX"

              done < /tmp/sub_videos.tsv

            done
          fi

          # ─── Process direct videos (playlist URL) ───
          if [[ "$VIDEO_COUNT" -gt 0 ]] && [[ "$PLAYLIST_COUNT" -eq 0 ]]; then
            echo ""
            echo "🎬 Processing $VIDEO_COUNT videos..."

            SAFE_PLAYLIST=$(echo "$YT_TITLE" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
            ARCHIVE_PREFIX="${SAFE_CHANNEL}-${SAFE_PLAYLIST}"

            VCOUNT=0
            grep "^VIDEO" /tmp/video_list.tsv | while IFS=$'\t' read -r _ vid vtitle vplaylist vdur; do
              [[ -z "$vid" ]] && continue
              [[ "$ABORT" == "true" ]] && break
              VCOUNT=$((VCOUNT + 1))

              if [[ -n "$MAX_VIDEOS" ]] && [[ "$VCOUNT" -gt "$MAX_VIDEOS" ]]; then
                break
              fi

              echo ""
              echo "  ──────────────────────────────"
              echo "  🎬 [$VCOUNT/$VIDEO_COUNT] $vtitle"

              process_video "$vid" "$vtitle" "$vplaylist" "$ARCHIVE_PREFIX"

            done
          fi

          echo ""
          echo "═══════════════════════════════════════"
          echo "📺 Archival Complete"
          echo "  ✅ Uploaded: $SUCCESS"
          echo "  ❌ Failed:   $FAILED"
          echo "  ⏭️ Skipped:  $SKIPPED"
          echo "  📊 Total:    $TOTAL"
          echo "═══════════════════════════════════════"
          echo ""
          if [[ "$FAILED" -gt 0 ]]; then
            RESUME=$((TOTAL - FAILED + 1))
            echo "💡 To resume: re-run with start_from=$RESUME and skip_existing=true"
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: "🧹 Cleanup"
        if: always()
        run: |
          rm -f /tmp/cookies.txt
          rm -rf /tmp/transfer

      - name: "📡 Send Discord Report"
        if: always()
        run: |
          WEBHOOK="${DISCORD_WEBHOOK_REPORTS:-$DISCORD_WEBHOOK_URL}"
          [[ -z "$WEBHOOK" ]] && exit 0

          CHANNEL="${{ steps.process.outputs.channel }}"
          TOTAL="${{ steps.process.outputs.total }}"
          SUCCESS="${{ steps.process.outputs.success }}"
          FAILED="${{ steps.process.outputs.failed }}"
          SKIPPED="${{ steps.process.outputs.skipped }}"
          MODE="${{ github.event.inputs.mode }}"
          URL="${{ github.event.inputs.url }}"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          COLOR=5763757
          [[ "$FAILED" -gt 0 ]] 2>/dev/null && COLOR=16744448

          FIELDS="[]"
          FIELDS=$(echo "$FIELDS" | jq --arg v "${CHANNEL:-Unknown}" '. + [{"name":"📺 Channel","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "$MODE" '. + [{"name":"⚙️ Mode","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${{ github.event.inputs.quality }}" '. + [{"name":"🎥 Quality","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq '. + [{"name":"\u200b","value":"\u200b","inline":false}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${SUCCESS:-0}" '. + [{"name":"✅ Uploaded","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${FAILED:-0}" '. + [{"name":"❌ Failed","value":$v,"inline":true}]')
          FIELDS=$(echo "$FIELDS" | jq --arg v "${SKIPPED:-0}" '. + [{"name":"⏭️ Skipped","value":$v,"inline":true}]')

          SHORT_URL=$(echo "$URL" | head -c 60)
          FIELDS=$(echo "$FIELDS" | jq --arg v "$SHORT_URL" '. + [{"name":"🔗 Source","value":("`" + $v + "`"),"inline":false}]')

          PAYLOAD=$(jq -n \
            --arg username "${BOT_USERNAME:-☪️ The Muslim Lantern}" \
            --arg avatar "${AVATAR_URL:-}" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            --argjson fields "$FIELDS" \
            '{
              username: $username,
              avatar_url: $avatar,
              embeds: [{
                title: "📺 YouTube → Archive.org Complete",
                description: "> YouTube channel/playlist archived to Archive.org\n> One video at a time — disk safe. Resumable.",
                color: $color,
                fields: $fields,
                footer: { text: "📺 YouTube Channel Archiver" },
                timestamp: $timestamp
              }]
            }')

          curl -s -o /dev/null -w "Discord: HTTP %{http_code}\n" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$WEBHOOK"
