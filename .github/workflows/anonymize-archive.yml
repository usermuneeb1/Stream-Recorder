# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔒 Anonymize Archive.org Uploads — One-Time Fix                           ║
# ║  Updates metadata on all old uploads to remove channel name/stream info.   ║
# ║  Run once manually. New uploads are already anonymized.                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🔒 Anonymize Archive.org"

on:
  workflow_dispatch:

env:
  ARCHIVE_ACCESS_KEY: ${{ secrets.ARCHIVE_ACCESS_KEY }}
  ARCHIVE_SECRET_KEY: ${{ secrets.ARCHIVE_SECRET_KEY }}
  TZ: Asia/Karachi

jobs:
  anonymize:
    name: "🔒 Anonymize Old Uploads"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl python3
          sed -i 's/\r$//' scripts/*.sh 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: "🔒 Anonymize All Old Uploads"
        run: bash scripts/anonymize-archive.sh
