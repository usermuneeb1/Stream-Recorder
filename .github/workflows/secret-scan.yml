# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔐 Secret Scanning — block leaked tokens/keys                               ║
# ║  Runs gitleaks on every push/PR and on a schedule. Alerts (and fails the     ║
# ║  run) if an API key, token, or password is detected in the code or history.  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🔐 Secret Scan"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"   # weekly Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - name: "📥 Checkout (full history)"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "🔎 Run gitleaks"
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No license needed for public repos.

      - name: "📡 Notify Discord on leak"
        if: failure()
        run: |
          WEBHOOK="${{ secrets.DISCORD_WEBHOOK_ALERTS }}"
          [[ -z "$WEBHOOK" ]] && WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"
          [[ -z "$WEBHOOK" ]] && exit 0
          curl -s -o /dev/null -H "Content-Type: application/json" -d '{
            "username": "🔐 Secret Scanner",
            "embeds": [{
              "title": "⚠️ Potential secret detected!",
              "description": "gitleaks found a possible leaked credential. Review the run and ROTATE the secret immediately.",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "color": 15158332
            }]
          }' "$WEBHOOK"
