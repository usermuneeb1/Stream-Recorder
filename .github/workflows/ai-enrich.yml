# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🧠 AI Enrichment — Transcripts, Summaries, Chapters, Tags (free via Groq)   ║
# ║  Runs after new recordings (and on a schedule) to add AI metadata to the     ║
# ║  gallery. No-op if GROQ_API_KEY secret is not configured.                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🧠 AI Enrichment"

on:
  workflow_dispatch:
    inputs:
      max_items:
        description: "Max recordings to enrich this run"
        required: false
        default: "2"
        type: string
      force:
        description: "Re-enrich videos that already have AI data (regenerate chapters)"
        required: false
        default: false
        type: boolean
  schedule:
    # Daily at 09:00 UTC — picks up any recordings missing AI data.
    - cron: "0 9 * * *"
  push:
    branches: [main]
    paths:
      - "data/recordings.json"

permissions:
  contents: write

concurrency:
  group: ai-enrich
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  enrich:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v7

      - name: "🔑 Skip if no GROQ key"
        id: gate
        run: |
          if [[ -z "${{ secrets.GROQ_API_KEY }}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ GROQ_API_KEY not set — skipping AI enrichment."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "🐍 Set up Python"
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install deps (ffmpeg + python)"
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg tesseract-ocr
          pip3 install --quiet -r scripts/ai/requirements.txt

      - name: "🧠 Run enrichment"
        if: steps.gate.outputs.run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ARCHIVE_ACCESS_KEY: ${{ secrets.ARCHIVE_ACCESS_KEY }}
          ARCHIVE_SECRET_KEY: ${{ secrets.ARCHIVE_SECRET_KEY }}
          AI_MAX_ITEMS: ${{ github.event.inputs.max_items || '2' }}
          AI_FORCE: ${{ github.event.inputs.force || 'false' }}
        run: python3 scripts/ai/enrich.py

      - name: "💾 Commit AI metadata"
        if: steps.gate.outputs.run == 'true'
        run: |
          if [[ -n "$(git status -s data/recordings.json)" ]]; then
            git config user.name "Stream Recorder Bot"
            git config user.email "bot@stream-recorder.local"
            git add data/recordings.json
            git commit -m "🧠 AI: add transcripts/summaries/chapters — $(date -u '+%Y-%m-%d')"
            git push
            echo "✅ AI metadata committed."
          else
            echo "No changes to commit."
          fi
