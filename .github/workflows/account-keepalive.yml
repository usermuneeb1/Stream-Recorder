# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔄 ACCOUNT KEEP-ALIVE — Prevents MEGA file deletion                      ║
# ║  Runs monthly to keep MEGA cloud accounts active.                          ║
# ║                                                                            ║
# ║  MEGA.nz:     Deletes files after 90 days of inactivity                   ║
# ║  Archive.org: No keep-alive needed (truly permanent)                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🔄 Account Keep-Alive"

on:
  schedule:
    # Run on the 1st and 15th of every month at 10:00 UTC (3:00 PM PKT)
    - cron: "0 10 1 * *"     # 1st of month
    - cron: "0 10 15 * *"    # 15th of month (safety — twice a month)
  workflow_dispatch:           # Manual trigger

env:
  MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
  MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  TZ: Asia/Karachi

jobs:
  keepalive:
    name: "🔄 Keep Accounts Active"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🔴 MEGA.nz — Keep Alive"
        id: mega
        run: |
          echo "═══════════════════════════════════════"
          echo "🔴 MEGA.nz Keep-Alive"
          echo "═══════════════════════════════════════"

          # Install megatools
          sudo apt-get install -y -qq megatools python3 2>/dev/null

          MEGA_OK=0
          MEGA_TOTAL=0

          # Method 1: Sign into the main MEGA account (from secrets)
          if [[ -n "$MEGA_EMAIL" ]] && [[ -n "$MEGA_PASSWORD" ]]; then
            cat > /tmp/.megarc << 'MEGARC'
[Login]
MEGARC
            echo "Username = ${MEGA_EMAIL}" >> /tmp/.megarc
            echo "Password = ${MEGA_PASSWORD}" >> /tmp/.megarc
            chmod 600 /tmp/.megarc

            echo "📂 Signing into main MEGA account..."
            if megals --config /tmp/.megarc /Root/ 2>/dev/null; then
              FILE_COUNT=$(megals --config /tmp/.megarc -R /Root/ 2>/dev/null | wc -l)
              echo "✅ Main account alive — $FILE_COUNT files"
              MEGA_OK=$((MEGA_OK + 1))
              MEGA_TOTAL=$((MEGA_TOTAL + 1))

              USAGE=$(megadf --config /tmp/.megarc 2>/dev/null | head -3 || echo "N/A")
              echo "📊 Storage: $USAGE"
            else
              echo "❌ Main account sign-in failed"
              MEGA_TOTAL=$((MEGA_TOTAL + 1))
            fi
            rm -f /tmp/.megarc
          else
            echo "⚠️ MEGA_EMAIL/MEGA_PASSWORD not set — skipping main account"
          fi

          # Method 2: Sign into ALL generated accounts (from accounts.csv)
          if [[ -f scripts/mega/accounts.csv ]]; then
            echo ""
            echo "📂 Signing into generated accounts (accounts.csv)..."
            pip3 install --quiet -r scripts/mega/requirements.txt 2>/dev/null || true
            
            if python3 scripts/mega/signin_accounts.py; then
              GEN_SUCCESS=$(jq -r '.success' scripts/mega/signin_results.json 2>/dev/null || echo "0")
              GEN_TOTAL=$(jq -r '.total' scripts/mega/signin_results.json 2>/dev/null || echo "0")
              MEGA_OK=$((MEGA_OK + GEN_SUCCESS))
              MEGA_TOTAL=$((MEGA_TOTAL + GEN_TOTAL))
              echo "✅ Generated accounts: ${GEN_SUCCESS}/${GEN_TOTAL} alive"
            else
              GEN_TOTAL=$(jq -r '.total' scripts/mega/signin_results.json 2>/dev/null || echo "0")
              GEN_SUCCESS=$(jq -r '.success' scripts/mega/signin_results.json 2>/dev/null || echo "0")
              MEGA_OK=$((MEGA_OK + GEN_SUCCESS))
              MEGA_TOTAL=$((MEGA_TOTAL + GEN_TOTAL))
              echo "⚠️ Some generated accounts failed"
            fi
            rm -f scripts/mega/signin_results.json
          else
            echo "ℹ️ No accounts.csv — no generated accounts to check"
          fi

          # Set output
          if [[ $MEGA_TOTAL -eq 0 ]]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
          elif [[ $MEGA_OK -eq $MEGA_TOTAL ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=partial" >> $GITHUB_OUTPUT
          fi
          echo "files=${MEGA_OK}/${MEGA_TOTAL}" >> $GITHUB_OUTPUT

      - name: "📡 Send Discord Report"
        if: always()
        run: |
          MEGA_STATUS="${{ steps.mega.outputs.status }}"
          MEGA_FILES="${{ steps.mega.outputs.files }}"

          WEBHOOK="${DISCORD_WEBHOOK_REPORTS:-$DISCORD_WEBHOOK_URL}"
          [[ -z "$WEBHOOK" ]] && exit 0

          # Build status icons
          MEGA_ICON="⚠️ Skipped"
          [[ "$MEGA_STATUS" == "success" ]] && MEGA_ICON="✅ All Active ($MEGA_FILES accounts)"
          [[ "$MEGA_STATUS" == "partial" ]] && MEGA_ICON="⚠️ Partial ($MEGA_FILES accounts alive)"
          [[ "$MEGA_STATUS" == "failed" ]] && MEGA_ICON="❌ Failed"

          # Overall color
          COLOR=5763757  # green
          if [[ "$MEGA_STATUS" == "failed" ]]; then
            COLOR=15158332  # red
          elif [[ "$MEGA_STATUS" == "partial" ]]; then
            COLOR=16744448  # orange
          elif [[ "$MEGA_STATUS" == "skipped" ]]; then
            COLOR=16776960  # yellow
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          DATE_STR=$(TZ='Asia/Karachi' date '+%B %d, %Y')

          PAYLOAD=$(jq -n \
            --arg username "${BOT_USERNAME:-☪️ The Muslim Lantern}" \
            --arg avatar "${AVATAR_URL:-}" \
            --arg date "$DATE_STR" \
            --arg mega "$MEGA_ICON" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              content: "@everyone",
              username: $username,
              avatar_url: $avatar,
              embeds: [{
                title: "🔄 Monthly Account Keep-Alive",
                description: (
                  "> **Automatic activity ping** to prevent cloud services\n" +
                  "> from deleting recordings due to inactivity.\n\n" +
                  "**📅 Date:** " + $date + "\n\n" +
                  "**🔴 MEGA.nz:** " + $mega + "\n" +
                  "*(Deletes files after 90 days of inactivity)*\n\n" +
                  "**🏛️ Archive.org:** ✅ No action needed\n" +
                  "*(Truly permanent — no inactivity rules)*"
                ),
                color: $color,
                footer: {
                  text: "☪️ Account Keep-Alive · Runs twice monthly · Made with ❤️ by Muneeb Ahmad"
                },
                timestamp: $timestamp
              }]
            }')

          curl -s -o /dev/null -w "Discord: HTTP %{http_code}\n" \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK"
