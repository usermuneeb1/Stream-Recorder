# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  📡 STREAM RECORDER — CLOUD LINK REFRESH WORKFLOW                          ║
# ║  Runs every 3 days to keep Gofile/Pixeldrain links alive.                  ║
# ║  Pings each link to reset the 60-day inactivity timer.                    ║
# ║  Dead links are reported and can be restored from Archive.org.            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🔄 Cloud Link Refresh"

on:
  schedule:
    # 🟠 Gofile expires after 10 days of inactivity → refresh ~every 5 days (5-day buffer).
    - cron: "0 6 */5 * *"
    # 🔵 Pixeldrain expires after 60 days of inactivity → refresh monthly (~30-day buffer).
    # Pinned to the 2nd of the month so it never collides with a Gofile */5 day.
    - cron: "0 6 2 * *"
  
  workflow_dispatch:
    inputs:
      providers:
        description: "Which providers to refresh: gofile | pixeldrain | both"
        required: false
        default: "both"
        type: string
      dry_run:
        description: "Dry run (check only, no refresh)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: cloud-refresh
  cancel-in-progress: false

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
  DISCORD_WEBHOOK_LINKS: ${{ secrets.DISCORD_WEBHOOK_LINKS }}
  DISCORD_WEBHOOK_RECORDINGS: ${{ secrets.DISCORD_WEBHOOK_RECORDINGS }}
  DISCORD_WEBHOOK_REFRESH: ${{ secrets.DISCORD_WEBHOOK_REFRESH }}
  DISCORD_WEBHOOK_REPORTS: ${{ secrets.DISCORD_WEBHOOK_REPORTS }}
  PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  AVATAR_URL: ${{ secrets.AVATAR_URL }}
  TZ: Asia/Karachi

jobs:
  refresh:
    name: "🔗 Refresh Cloud Links"
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq bc curl python3
          sed -i 's/\r$//' scripts/*.sh scripts/*.env 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: "🔄 Refresh Links"
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          # Manual run → use the provider(s) the user picked.
          # Scheduled run → pick by WHICH cron fired: the monthly cron = pixeldrain,
          # any other (the */5 cron) = gofile. (github.event.schedule holds the cron
          # string that triggered a scheduled run.)
          REFRESH_PROVIDERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.providers || (github.event.schedule == '0 6 2 * *' && 'pixeldrain' || 'gofile') }}
        run: bash scripts/refresh-links.sh

      - name: "📢 Send Discord Notification"
        if: always()
        continue-on-error: true
        run: |
          source scripts/utils.sh
          source scripts/discord-notify.sh
          notify_links_refreshed

      - name: "📋 Summary"
        if: always()
        run: |
          source scripts/utils.sh
          
          echo "## 🔄 Cloud Link Refresh Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ Time | $(now_pkt) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Checked | ${REFRESH_TOTAL_CHECKED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Alive | ${REFRESH_TOTAL_ALIVE:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Refreshed | ${REFRESH_TOTAL_REFRESHED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💀 Dead | ${REFRESH_TOTAL_DEAD:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏛️ DC Msgs Edited | ${REFRESH_TOTAL_RESTORED:-0} |" >> $GITHUB_STEP_SUMMARY
