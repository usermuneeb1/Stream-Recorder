name: 📱 Telegram Mirror

on:
  workflow_run:
    workflows: ["📡 Stream Recorder"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: telegram-mirror
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upload-all:
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyrogram tgcrypto

      - name: 📱 Upload ALL recordings to Telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYSCRIPT'
          import json, os, subprocess, sys

          with open("data/recordings.json") as f:
              recs = json.load(f)

          todo = [r for r in recs if not r.get("telegram_link") and (r.get("archive_direct") or r.get("archive_node") or r.get("archive_link"))]

          if not todo:
              print("✅ All recordings already have Telegram links")
              sys.exit(0)

          print(f"📱 Found {len(todo)} recordings to upload\n")

          for i, rec in enumerate(todo):
              title = rec.get("title", "Recording")
              vid = rec.get("video_id", "")
              url = rec.get("archive_direct") or rec.get("archive_node") or ""
              if not url and rec.get("archive_link"):
                  url = rec["archive_link"].replace("/details/", "/download/") + "/"

              print(f"\n{'='*60}")
              print(f"📱 [{i+1}/{len(todo)}] {title}")

              safe = "".join(c if c.isalnum() or c in "._-" else "_" for c in title[:60]) + ".mp4"
              path = f"/tmp/{safe}"

              print(f"   📥 Downloading...")
              dl = subprocess.run(["curl", "-L", "--retry", "3", "--max-time", "3600", "-o", path, url], capture_output=True)
              if dl.returncode != 0 or not os.path.exists(path) or os.path.getsize(path) < 10000:
                  print(f"   ❌ Download failed")
                  continue

              size = os.path.getsize(path)
              print(f"   📦 Downloaded: {size/1024/1024:.0f} MB")

              # Upload
              env = os.environ.copy()
              env["GITHUB_OUTPUT"] = f"/tmp/tg_out_{i}.txt"
              open(env["GITHUB_OUTPUT"], "w").close()

              up = subprocess.run(
                  ["python3", "scripts/telegram/upload_to_telegram.py", path, title],
                  env=env)

              # Read output — capture BOTH the t.me link AND the Telegram file_id.
              # upload_to_telegram.py writes telegram_file_id= specifically so the
              # Cloudflare Worker proxy can stream the file (see its "Save file_id
              # for Cloudflare Worker proxy" comment).
              tg_link = ""
              tg_file_id = ""
              try:
                  for line in open(env["GITHUB_OUTPUT"]):
                      if line.startswith("telegram_link="):
                          tg_link = line.strip().split("=", 1)[1]
                      elif line.startswith("telegram_file_id="):
                          tg_file_id = line.strip().split("=", 1)[1]
              except: pass

              if tg_link:
                  import urllib.parse
                  for r in recs:
                      if r.get("video_id") == vid:
                          r["telegram_link"] = tg_link
                          if tg_file_id:
                              r["telegram_file_id"] = tg_file_id
                          # CF Worker stream URL. The worker (worker.js) was hardened
                          # to ONLY accept ?file_id= — ?url= and ?bot= were removed
                          # (open-proxy / token-leak risk) and now return HTTP 400.
                          # The dashboard's sanitizeCfStream() also strips ?url=/?bot=.
                          # So the URL MUST be built from the Telegram file_id, NOT the
                          # archive source. (Previously this used ?url=<src>, which
                          # produced a dead STORM player source on every recording.)
                          if tg_file_id:
                              r["cf_stream"] = f"https://tg-stream.isthatdxture.workers.dev/?file_id={urllib.parse.quote(tg_file_id, safe='')}"
                          break
                  with open("data/recordings.json", "w") as f:
                      json.dump(recs, f, indent=2)
                  print(f"   ✅ Link: {tg_link}")

              try: os.remove(path)
              except: pass

          print(f"\n{'='*60}\n✅ Done")
          PYSCRIPT

      - name: 📤 Push
        run: |
          git config user.name "Stream Recorder Bot"
          git config user.email "bot@stream-recorder"
          git add data/recordings.json
          git diff --cached --quiet || {
            git commit -m "📱 Telegram: uploaded all recordings"
            git push
          }
