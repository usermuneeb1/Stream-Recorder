<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Muslim Lantern — Official live stream archive" />
  <title>The Muslim Lantern — Stream Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --bg: #f8f6f4;
      --surface: #ffffff;
      --surface2: #f3f0ee;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #b91c1c;
      --accent-soft: #fef2f2;
      --border: rgba(185, 28, 28, 0.12);
      --shadow: 0 4px 24px rgba(28, 25, 23, 0.06);
      --shadow-lg: 0 24px 64px rgba(185, 28, 28, 0.12);
    }
    [data-theme="dark"] {
      --bg: #0c0a09;
      --surface: #1c1917;
      --surface2: #292524;
      --text: #fafaf9;
      --muted: #a8a29e;
      --accent: #ef4444;
      --accent-soft: rgba(239, 68, 68, 0.12);
      --border: rgba(239, 68, 68, 0.2);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
    }
    .app { max-width: 1140px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

    .brand-block h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.65rem; font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-block h1 span { color: var(--accent); }
    .brand-block p { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }

    .theme-btn {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font: inherit; font-size: 0.8rem; font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s;
    }
    .theme-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); border-color: var(--accent); }
    .theme-btn:active { transform: scale(0.97); }

    .hero {
      padding: 2rem 0 1.5rem;
      animation: fadeIn 0.7s 0.1s ease both;
    }
    .hero h2 {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
      line-height: 1.25;
    }
    .hero p { color: var(--muted); margin-top: 0.5rem; max-width: 520px; font-size: 0.95rem; }

    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.15rem 1.25rem;
      box-shadow: var(--shadow);
      opacity: 0;
      animation: rise 0.5s ease forwards;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .stat:nth-child(1) { animation-delay: 0.12s; }
    .stat:nth-child(2) { animation-delay: 0.18s; }
    .stat:nth-child(3) { animation-delay: 0.24s; }
    .stat:nth-child(4) { animation-delay: 0.3s; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .stat:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .stat .n { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat .l { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 0.2rem; font-weight: 600; }

    .toolbar { margin-bottom: 1.25rem; animation: fadeIn 0.6s 0.25s ease both; }
    .search {
      width: 100%; padding: 0.85rem 1rem 0.85rem 2.75rem;
      border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font: inherit; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search-box { position: relative; }
    .search-box::before {
      content: ""; position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; border: 2px solid var(--muted); border-radius: 50%;
    }
    .search-box::after {
      content: ""; position: absolute; left: 1.65rem; top: 58%;
      width: 6px; height: 2px; background: var(--muted); transform: rotate(45deg);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      animation: rise 0.45s ease forwards;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s, border-color 0.3s;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }
    .thumb { position: relative; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .card:hover .thumb img { transform: scale(1.05); }
    .thumb-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .card:hover .thumb-fade { opacity: 1; }
    .play {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--surface); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      transform: scale(0.85); transition: transform 0.3s ease;
      box-shadow: var(--shadow-lg);
    }
    .card:hover .play { transform: scale(1); }
    .badge-dur {
      position: absolute; top: 10px; right: 10px;
      background: var(--accent); color: #fff;
      font-size: 0.68rem; font-weight: 700;
      padding: 0.25rem 0.5rem; border-radius: 6px;
    }
    .card-body { padding: 1rem 1.15rem; }
    .card-body h3 { font-size: 0.92rem; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; }
    .pills { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.55rem; }
    .pill { font-size: 0.65rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 5px; background: var(--accent-soft); color: var(--accent); }

    .empty {
      grid-column: 1/-1; text-align: center; padding: 3rem;
      background: var(--surface); border: 1px dashed var(--border); border-radius: 16px;
    }

    .modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(12, 10, 9, 0.7);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s;
    }
    .modal.show { opacity: 1; visibility: visible; }
    .modal-panel {
      width: 100%; max-width: 900px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transform: scale(0.94) translateY(16px);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      max-height: 92vh;
      display: flex; flex-direction: column;
    }
    .modal.show .modal-panel { transform: scale(1) translateY(0); }
    .modal-top {
      padding: 1rem 1.25rem;
      background: var(--accent);
      color: #fff;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
    }
    .modal-top h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.35; flex: 1; }
    .modal-close {
      border: none; background: rgba(255,255,255,0.15);
      color: #fff; width: 36px; height: 36px; border-radius: 10px;
      font-size: 1.25rem; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.28); transform: rotate(90deg); }
    .tabs {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 0.45rem 0.85rem; border: none; border-radius: 8px;
      background: transparent; color: var(--muted);
      font: inherit; font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .tab:hover { color: var(--accent); background: var(--accent-soft); }
    .tab.on { background: var(--accent); color: #fff; }
    .tab:active { transform: scale(0.96); }
    .player-wrap {
      position: relative; aspect-ratio: 16/9;
      background: #000; min-height: 260px;
    }
    .player-wrap iframe, .player-wrap video {
      position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
    }
    .player-status {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      padding: 2rem; text-align: center; color: #a8a29e; font-size: 0.88rem;
    }
    .player-status.on { display: flex; }
    .loader {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
    }
    .loader.hide { display: none; }
    .loader-ring {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2.5rem; padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center; font-size: 0.78rem; color: var(--muted);
    }
    footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-block">
        <h1>The <span>Muslim Lantern</span></h1>
        <p>Official live stream archive</p>
      </div>
      <button type="button" class="theme-btn" id="theme-btn" aria-label="Toggle theme">Dark mode</button>
    </header>

    <section class="hero">
      <h2>Your recorded streams</h2>
      <p>Watch and download every live stream from The Muslim Lantern. Thumbnails are stored on MEGA and Archive.org so they stay visible when YouTube removes them.</p>
    </section>

    <section class="stats" id="stats"></section>

    <div class="toolbar">
      <div class="search-box">
        <input type="search" class="search" id="search" placeholder="Search recordings…" autocomplete="off" />
      </div>
    </div>

    <section class="grid" id="grid"></section>

    <footer>
      <p>Stream Recorder · <a href="https://github.com/usermuneeb1/Stream-Recorder" target="_blank" rel="noopener">GitHub</a></p>
    </footer>
  </div>

  <div class="modal" id="modal">
    <div class="modal-panel">
      <div class="modal-top">
        <h2 id="modal-title"></h2>
        <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="player-wrap" id="player-wrap">
        <div class="loader" id="loader"><div class="loader-ring"></div></div>
        <div class="player-status" id="player-status"></div>
      </div>
    </div>
  </div>

  <script>
    const RAW = 'https://raw.githubusercontent.com/usermuneeb1/Stream-Recorder/main';
    const CHANNEL = 'the muslim lantern';

    let streams = [];
    let current = null;

    const $ = id => document.getElementById(id);
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function isTML(ch) { return (ch || '').toLowerCase().includes(CHANNEL); }
    function ytId(u) { const m = (u || '').match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : ''; }
    function archiveId(u) { const m = (u || '').match(/archive\.org\/details\/([^/?\s]+)/); return m ? m[1] : ''; }
    function pixelId(u) { const m = (u || '').match(/pixeldrain\.com\/u\/([a-zA-Z0-9]+)/); return m ? m[1] : ''; }
    function gofileCode(u) { const m = (u || '').match(/gofile\.io\/d\/([a-zA-Z0-9]+)/); return m ? m[1] : ''; }
    function megaEmbed(u) {
      const m = (u || '').match(/mega\.nz\/(?:file|folder)\/([^#]+)(?:#(.+))?/);
      return m ? `https://mega.nz/embed/${m[2] ? m[1] + '#' + m[2] : m[1]}` : null;
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function isHotlink(url) {
      return url && url.startsWith('http') && !url.includes('ytimg.com') && !url.includes('mega.nz');
    }

    function parseLinks(text) {
      const out = [];
      for (const block of text.split(/={10,}/)) {
        const b = block.trim();
        if (!b || b.startsWith('#')) continue;
        const get = k => { const m = b.match(new RegExp(`^${k}:\\s*(.+)$`, 'im')); return m ? m[1].trim() : ''; };
        if (!isTML(get('Channel'))) continue;
        const url = get('URL');
        if (!url.includes('youtube')) continue;
        const links = {};
        for (const line of b.split('\n')) {
          const lm = line.match(/^\[(\w+):([^\]]+)\]\s+(https?:\S+)/);
          if (lm) links[`${lm[1]}_${lm[2]}`.toLowerCase()] = lm[3].replace(/\s+\(PERMANENT\)$/, '');
        }
        const vid = ytId(url);
        const thumb = get('Thumbnail');
        const thumbMega = get('ThumbnailMEGA');
        const displayThumb = isHotlink(thumb) ? thumb : (thumbMega ? '' : `https://i.ytimg.com/vi/${vid}/hqdefault.jpg`);
        out.push({
          title: get('Title'), channel: get('Channel'), date: get('Date'), url, videoId: vid,
          duration: get('Duration'), size: get('Size'),
          thumbnail: displayThumb,
          thumbnailMega: thumbMega || '',
          sources: buildSources(url, vid, links)
        });
      }
      return out;
    }

    function buildSources(url, vid, links) {
      const s = { youtube: { type: 'youtube', label: 'YouTube', url } };
      if (links.archive_hd) s.archive = { type: 'archive', label: 'Archive.org', url: links.archive_hd };
      if (links.archive_compressed) s.archiveSmall = { type: 'archive', label: 'Archive (compressed)', url: links.archive_compressed };
      if (links.gofile_hd) s.gofile = { type: 'gofile', label: 'Gofile', url: links.gofile_hd };
      if (links.gofile_compressed) s.gofileSmall = { type: 'gofile', label: 'Gofile (small)', url: links.gofile_compressed };
      if (links.pixeldrain_hd || links.pixeldrain_compressed)
        s.pixel = { type: 'pixeldrain', label: 'Pixeldrain', url: links.pixeldrain_hd || links.pixeldrain_compressed };
      if (links.mega_hd || links.mega_compressed)
        s.mega = { type: 'mega', label: 'MEGA', url: links.mega_hd || links.mega_compressed };
      return s;
    }

    function merge(list, recs) {
      const map = Object.fromEntries(list.map(s => [s.videoId, s]));
      for (const r of recs || []) {
        if (!isTML(r.channel)) continue;
        const id = r.video_id || ytId(r.video_url);
        if (!id) continue;
        let s = map[id] || {
          title: r.title, channel: r.channel, date: r.date, url: r.video_url, videoId: id,
          duration: r.duration_fmt, size: r.size_human,
          thumbnail: isHotlink(r.thumbnail) ? r.thumbnail : `https://i.ytimg.com/vi/${id}/hqdefault.jpg`,
          thumbnailMega: r.thumbnail_mega || '',
          sources: { youtube: { type: 'youtube', label: 'YouTube', url: r.video_url } }
        };
        if (r.gofile_link) s.sources.gofile = { type: 'gofile', label: 'Gofile', url: r.gofile_link };
        if (r.pixeldrain_link) s.sources.pixel = { type: 'pixeldrain', label: 'Pixeldrain', url: r.pixeldrain_link };
        if (r.archive_link) s.sources.archive = { type: 'archive', label: 'Archive.org', url: r.archive_link };
        if (r.mega_link && r.mega_link.includes('mega.nz')) s.sources.mega = { type: 'mega', label: 'MEGA', url: r.mega_link };
        if (isHotlink(r.thumbnail)) s.thumbnail = r.thumbnail;
        if (r.thumbnail_mega) s.thumbnailMega = r.thumbnail_mega;
        map[id] = s;
      }
      return Object.values(map).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }

    function initTheme() {
      const saved = localStorage.getItem('tml-theme') || 'light';
      document.documentElement.dataset.theme = saved;
      $('theme-btn').textContent = saved === 'dark' ? 'Light mode' : 'Dark mode';
    }
    $('theme-btn').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('tml-theme', next);
      $('theme-btn').textContent = next === 'dark' ? 'Light mode' : 'Dark mode';
    });

    function renderStats(st) {
      $('stats').innerHTML = `
        <div class="stat"><div class="n">${st?.total_streams ?? 0}</div><div class="l">Streams</div></div>
        <div class="stat"><div class="n">${Number(st?.total_hours ?? 0).toFixed(1)}h</div><div class="l">Hours</div></div>
        <div class="stat"><div class="n">${Number(st?.total_gb ?? 0).toFixed(1)}</div><div class="l">Gigabytes</div></div>
        <div class="stat"><div class="n" style="font-size:1rem">${esc((st?.last_stream?.date || '—').split(' ').slice(0,3).join(' '))}</div><div class="l">Latest</div></div>`;
    }

    function sourceList(s) { return Object.values(s.sources || {}).filter(Boolean); }

    function renderGrid() {
      const q = $('search').value.toLowerCase().trim();
      const list = streams.filter(s => !q || s.title.toLowerCase().includes(q));
      const g = $('grid');
      if (!list.length) {
        g.innerHTML = '<div class="empty"><p style="font-weight:600;color:var(--accent)">No recordings yet</p><p style="margin-top:0.5rem;color:var(--muted)">Only The Muslim Lantern streams appear here.</p></div>';
        return;
      }
      g.innerHTML = list.map((s, i) => {
        const pills = sourceList(s).map(x => `<span class="pill">${esc(x.label)}</span>`).join('');
        const thumb = s.thumbnail || `https://i.ytimg.com/vi/${s.videoId}/hqdefault.jpg`;
        return `<article class="card" style="animation-delay:${0.05 * i}s" data-i="${i}">
          <div class="thumb">
            <img src="${esc(thumb)}" alt="" loading="lazy" onerror="this.src='';this.style.background='var(--accent-soft)'" />
            <span class="badge-dur">${esc(s.duration || '')}</span>
            <div class="thumb-fade"><div class="play"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div>
          </div>
          <div class="card-body">
            <h3>${esc(s.title)}</h3>
            <div class="card-meta">${esc(s.date?.split(' ').slice(0,3).join(' ') || '')} · ${esc(s.size || '')}</div>
            <div class="pills">${pills}</div>
          </div>
        </article>`;
      }).join('');
      g.querySelectorAll('.card').forEach(c => {
        c.addEventListener('click', () => openPlayer(list[+c.dataset.i]));
      });
    }

    function clearPlayer() {
      $('player-wrap').querySelectorAll('iframe,video').forEach(n => n.remove());
      $('player-status').classList.remove('on');
    }

    async function playGofile(url) {
      const code = gofileCode(url);
      if (!code) throw new Error('Invalid Gofile URL');
      const res = await fetch(`https://api.gofile.io/contents/${code}?wt=4fd6sg89d7s6`);
      const data = await res.json();
      const file = data?.data?.children && Object.values(data.data.children).find(c =>
        c.type === 'file' && /\.(mp4|mkv|webm|m4v)$/i.test(c.name || ''));
      if (file?.link) {
        clearPlayer();
        const v = document.createElement('video');
        v.controls = true; v.playsInline = true; v.src = file.link;
        $('player-wrap').appendChild(v);
        return;
      }
      throw new Error('Gofile blocks embedded pages. Direct stream unavailable — try Archive, MEGA, or YouTube.');
    }

    async function playSource(src) {
      $('loader').classList.remove('hide');
      $('player-status').classList.remove('on');
      clearPlayer();
      await sleep(150);
      try {
        if (src.type === 'youtube' && current?.videoId) {
          clearPlayer();
          const f = document.createElement('iframe');
          f.allow = 'accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture';
          f.allowFullscreen = true;
          f.src = `https://www.youtube.com/embed/${current.videoId}?rel=0&autoplay=1`;
          $('player-wrap').appendChild(f);
        } else if (src.type === 'archive') {
          const id = archiveId(src.url);
          if (!id) throw new Error('Archive ID missing');
          clearPlayer();
          const f = document.createElement('iframe');
          f.allowFullscreen = true;
          f.src = `https://archive.org/embed/${id}`;
          $('player-wrap').appendChild(f);
        } else if (src.type === 'pixeldrain') {
          const id = pixelId(src.url);
          if (!id) throw new Error('Pixeldrain ID missing');
          clearPlayer();
          const v = document.createElement('video');
          v.controls = true; v.playsInline = true;
          v.src = `https://pixeldrain.com/api/file/${id}/stream`;
          $('player-wrap').appendChild(v);
        } else if (src.type === 'gofile') {
          await playGofile(src.url);
        } else if (src.type === 'mega') {
          const emb = megaEmbed(src.url);
          if (!emb) throw new Error('MEGA link invalid');
          clearPlayer();
          const f = document.createElement('iframe');
          f.allowFullscreen = true;
          f.src = emb;
          $('player-wrap').appendChild(f);
        } else throw new Error('Unknown source');
      } catch (e) {
        clearPlayer();
        $('player-status').textContent = e.message;
        $('player-status').classList.add('on');
      }
      $('loader').classList.add('hide');
    }

    function openPlayer(s) {
      current = s;
      const entries = Object.entries(s.sources).filter(([, v]) => v);
      if (!entries.length) return;
      $('modal-title').textContent = s.title;
      $('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
      $('tabs').innerHTML = entries.map(([k, v], i) =>
        `<button type="button" class="tab ${i === 0 ? 'on' : ''}" data-i="${i}">${esc(v.label)}</button>`
      ).join('');
      $('tabs').querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          $('tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
          btn.classList.add('on');
          playSource(entries[+btn.dataset.i][1]);
        });
      });
      playSource(entries[0][1]);
    }

    function closeModal() {
      $('modal').classList.remove('show');
      document.body.style.overflow = '';
      clearPlayer();
      $('loader').classList.remove('hide');
      current = null;
    }

    $('modal-close').addEventListener('click', closeModal);
    $('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    $('search').addEventListener('input', renderGrid);

    async function init() {
      initTheme();
      try { renderStats(await (await fetch(`${RAW}/stats.json?t=${Date.now()}`)).json()); } catch { }
      let list = [];
      try { list = parseLinks(await (await fetch(`${RAW}/links.txt?t=${Date.now()}`)).text()); } catch { }
      try {
        const rec = await (await fetch(`${RAW}/data/recordings.json?t=${Date.now()}`)).json();
        list = merge(list, rec);
      } catch { }
      streams = list.filter(s => isTML(s.channel));
      renderGrid();
    }
    init();
  </script>
</body>
</html>
