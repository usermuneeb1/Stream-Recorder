<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Muslim Lantern — Stream Archive</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
</head>
<body>

  <!-- TOP NAV -->
  <nav>
    <a href="#" class="n-brand">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="border:none; border-radius:0;"><path d="M10 2h4M12 2v4M12 6c-3 0-4 2-4 4v2h8v-2c0-2-1-4-4-4zM8 12h8v6H8zM10 18h4v2c0 1.1-.9 2-2 2s-2-.9-2-2v-2z"></path></svg>
      The Muslim <span>Lantern</span>
    </a>
    <div class="n-tools">
      <div class="search-wrap">
        <input type="text" id="srch" placeholder="Search streams...">
      </div>
    </div>
  </nav>

  <!-- DYNAMIC HERO -->
  <div class="hero" id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="h-chan" id="hero-chan">Loading Archive...</div>
      <h1 class="h-title" id="hero-title">Syncing with Cloud</h1>
      <div class="h-meta" id="hero-meta">
        <!-- Dynamically populated from script -->
      </div>
      <div class="h-controls">
        <button class="btn-play" id="btn-play">▶ Play</button>
      </div>
    </div>
  </div>

  <!-- HORIZONTAL TRAY -->
  <section class="tray-sec">
    <div class="tray-head">
      <h2 class="tray-title">Archived Broadcasts</h2>
    </div>
    <div class="tray" id="grid">
      <!-- Cards rendered here via JS -->
    </div>
  </section>

  <!-- MODALS -->

  <!-- Player Modal -->
  <div class="modal-over" id="player-bg">
    <button class="pm-close" id="pm-close">✕</button>
    <div class="player-frame">
      <div class="vid-col">
        <div id="player-wrap"></div>
        <div class="vid-info">
          <div class="vi-main">
            <h2 id="vi-title">Stream Title</h2>
            <p>Direct Browser Playback</p>
          </div>
          <div class="vi-sources" id="vi-sources"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-over" id="del-bg">
    <div class="d-mod">
      <h3>Remove Recording</h3>
      <p style="color:var(--text-dim); margin-bottom:1.5rem; font-size:0.9rem;">
        Are you sure you want to remove this item from your dashboard view?
      </p>
      <button class="d-btn-hide" id="del-hide">Hide from View</button>
      <button class="d-btn-perm" id="del-perm">Permanently Remove</button>
      <button class="d-btn-hide" id="del-cancel" style="margin-top:0.5rem; background:transparent;">Cancel</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
