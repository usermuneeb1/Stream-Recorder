<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary Meta Tags -->
  <meta name="description" content="The Muslim Lantern — Stream Archive. Every live broadcast preserved forever. Searchable, free to watch. Preserving daʿwah, one stream at a time." />
  <meta name="keywords" content="Muslim Lantern, Islamic lectures, daʿwah, stream archive, Islamic content, Muslim talks, Islamic live streams, Quran, Hadith, Islamic knowledge" />
  <meta name="author" content="Muneeb Ahmad" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://muslim-lantern-archive.vercel.app/" />

  <!-- Theme & Platform -->
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="color-scheme" content="dark light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Muslim Lantern" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Muslim Lantern Archive" />
  <meta property="og:url" content="https://muslim-lantern-archive.vercel.app/" />
  <meta property="og:title" content="The Muslim Lantern — Stream Archive | Preserving Daʿwah Forever" />
  <meta property="og:description" content="Every live broadcast from The Muslim Lantern, preserved forever. Searchable, free to watch." />
  <meta property="og:image" content="/thumbnail.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Muslim Lantern — Stream Archive" />
  <meta name="twitter:description" content="Every live broadcast from The Muslim Lantern, preserved forever." />
  <meta name="twitter:image" content="/thumbnail.jpg" />

  <title>The Muslim Lantern — Stream Archive | Preserving Daʿwah Forever</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpg" href="/logo-vertical.pn.jpg" />
  <link rel="apple-touch-icon" href="/logo-vertical.pn.jpg" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Premium fonts: Cinzel for display (FGO-style elegance), Inter for body, JetBrains Mono for numbers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Inline critical styles -->
  <style>
    html, body { background: #0a0a0f; color: #f5f5f7; margin: 0; }
    .boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .boot-logo { width: 64px; height: 64px; border-radius: 16px; object-fit: cover; animation: logo-pulse 2s ease-in-out infinite; }
    .boot-text { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; letter-spacing: 0.1em; color: #d4af37; opacity: 0.8; }
    @keyframes logo-pulse { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="antialiased">
  <div id="root">
    <div class="boot">
      <img src="/logo-vertical.pn.jpg" alt="" class="boot-logo" />
      <span class="boot-text">Loading Archive…</span>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
