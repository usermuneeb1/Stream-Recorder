<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="The Muslim Lantern — Stream Archive. Preserving daʿwah, one stream at a time." />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="dark light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Muslim Lantern Archive" />
  <meta property="og:title" content="The Muslim Lantern — Stream Archive" />
  <meta property="og:description" content="Preserving daʿwah, one stream at a time." />
  <meta property="og:image" content="/thumbnail.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Muslim Lantern — Stream Archive" />
  <meta name="twitter:description" content="Preserving daʿwah, one stream at a time." />
  <meta name="twitter:image" content="/thumbnail.jpg" />

  <title>The Muslim Lantern — Stream Archive</title>
  <link rel="icon" type="image/jpg" href="/logo-vertical.pn.jpg" />
  <link rel="apple-touch-icon" href="/logo-vertical.pn.jpg" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://i.ytimg.com" />
  <link rel="preconnect" href="https://archive.org" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
  <link rel="dns-prefetch" href="https://pixeldrain.com" />

  <!-- Premium fonts (Inter for body, Plus Jakarta Sans for headings) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Inline critical paint styles so first render isn't a flash of unstyled content -->
  <style>
    html, body { background: #0a0a0a; color: #f5f5f5; margin: 0; }
    @media (prefers-color-scheme: light) { html, body { background: #fafafa; color: #111; } }
    .boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    .boot-dot { width: 10px; height: 10px; border-radius: 50%; background: #c62828; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>
</head>
<body class="antialiased">
  <div id="root">
    <div class="boot"><div class="boot-dot"></div></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
